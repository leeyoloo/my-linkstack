  --card-shadow-hover:0 16px 48px rgba(0,0,0,0.6),0 0 0 1px rgba(99,179,237,0.2);
  --music-bg:rgba(10,15,46,0.92);
}
[data-theme="light"] {
  --bg-primary:#f0f4ff;--bg-glass:rgba(255,255,255,0.72);--bg-glass-hover:rgba(255,255,255,0.9);
  --border-glass:rgba(99,179,237,0.2);--border-glass-hover:rgba(99,179,237,0.45);
  --text-primary:#1a202c;--text-secondary:rgba(74,85,104,0.85);--text-muted:rgba(113,128,150,0.6);

  --card-shadow-hover:0 16px 48px rgba(49,130,206,0.18),0 0 0 1px rgba(49,130,206,0.2);

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:"DM Sans",sans-serif;min-height:100vh;background:var(--bg-primary);color:var(--text-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 140px;overflow-x:hidden;transition:background .5s,color .4s;position:relative}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.bg-orbs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:orbFloat 20s ease-in-out infinite}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,#63b3ed,transparent 70%);top:-150px;left:-100px}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,#76e4f7,transparent 70%);bottom:-100px;right:-80px;animation-delay:-7s}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,#9f7aea,transparent 70%);top:40%;left:60%;animation-delay:-14s}
[data-theme="light"] .orb{opacity:0.08}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(40px,-30px) scale(1.05)}50%{transform:translate(-20px,40px) scale(0.95)}75%{transform:translate(30px,20px) scale(1.02)}}
.main-container{position:relative;z-index:10;width:100%;max-width:440px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;animation:fadeSlideDown .6s ease forwards}

.theme-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.toggle-label{font-size:12px;font-weight:500;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;transition:color .3s}
.toggle-switch{width:52px;height:28px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:14px;position:relative;backdrop-filter:blur(16px);transition:all .3s;cursor:pointer}

.toggle-knob{width:20px;height:20px;background:var(--accent);border-radius:50%;position:absolute;top:3px;left:4px;transition:all .35s cubic-bezier(.68,-.55,.27,1.55);box-shadow:0 0 8px var(--accent-glow)}
[data-theme="light"] .toggle-knob{left:calc(100% - 24px)}
.page-views-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--counter-bg);border:1px solid var(--counter-border);border-radius:20px;backdrop-filter:blur(16px);font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:500;color:var(--accent);transition:all .3s}

<script>
(function(){
  var canvas=document.getElementById('particles');
  var ctx=canvas.getContext('2d');
  var W,H,particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function createParticles(){
    particles=[];
    var count=Math.min(Math.floor(W*H/12000),120);
    for(var i=0;i<count;i++){
      particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.5,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,alpha:Math.random()*0.5+0.2});
    }
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    var color=document.documentElement.dataset.theme==='dark'?'99,179,237':'49,130,206';
    for(var i=0;i<particles.length;i++){
      for(var j=i+1;j<particles.length;j++){
        var dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<140){ctx.beginPath();ctx.strokeStyle='rgba('+color+','+(0.15*(1-dist/140))+')';ctx.lineWidth=0.5;ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();}
      }
    }
    particles.forEach(function(p){
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba('+color+','+p.alpha+')';ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
    });
    requestAnimationFrame(draw);
  }
  resize();createParticles();draw();
  window.addEventListener('resize',function(){resize();createParticles();});
})();
(function(){
  var toggle=document.getElementById('themeToggle');
  var label=document.getElementById('themeLabel');
  function syncLabel(){
    var isDark=document.documentElement.dataset.theme==='dark';
    label.textContent=isDark?'亮色':'暗色';
  }
  toggle.addEventListener('click',function(){
    var isDark=document.documentElement.dataset.theme==='dark';
    document.documentElement.dataset.theme=isDark?'light':'dark';
    syncLabel();
    localStorage.setItem('theme',document.documentElement.dataset.theme);
  });
  var saved=localStorage.getItem('theme');
  if(saved){document.documentElement.dataset.theme=saved;}
  syncLabel();
})();
(function(){

  el.textContent=count;
})();

    {title:'&#26228;&#22825;',artist:'&#21608;&#26480;&#20262;',coverEmoji:'&#9788;',url:''},
  ];
  var currentAudio=new Audio();
  function showPlayer(){panel.classList.add('visible');btn.classList.add('hidden');}
  function hidePlayer(){panel.classList.remove('visible');btn.classList.remove('hidden');if(currentAudio)currentAudio.pause();isPlaying=false;playBtn.textContent='▶';cover.classList.remove('playing');}
  btn.addEventListener('click',function(){showPlayer();if(playlist[currentSongIndex].url){loadSong(currentSongIndex);if(!isPlaying)togglePlay();}});
  progressBar.addEventListener('dblclick',function(){hidePlayer();});
  function loadSong(index){
    var song=playlist[index];
    title.textContent=song.title;
    artist.textContent=song.artist;
    cover.textContent=song.coverEmoji;
    if(song.url){currentAudio.src=song.url;currentAudio.load();}
  }
  function togglePlay(){
    if(!playlist[currentSongIndex].url){title.textContent='点;&#20987;&#32534;&#36753;&#38899;&#20048;&#21015;&#34920;';artist.textContent='在 HTML &#20013;&#20462;&#25913; playlist &#25968;&#32452;';return;}
    if(isPlaying){currentAudio.pause();playBtn.textContent='▶';cover.classList.remove('playing');btn.classList.remove('playing');}
    else{currentAudio.play().catch(function(){});playBtn.textContent='⏸';cover.classList.add('playing');btn.classList.add('playing');}
    isPlaying=!isPlaying;
  }
  currentAudio.addEventListener('timeupdate',function(){
    if(currentAudio.duration){progressFill.style.width=((currentAudio.currentTime/currentAudio.duration)*100)+'%';}
  });
  currentAudio.addEventListener('ended',function(){
    currentSongIndex=(currentSongIndex+1)%playlist.length;loadSong(currentSongIndex);
    if(isPlaying)currentAudio.play().catch(function(){});
  });
  playBtn.addEventListener('click',togglePlay);
  prevBtn.addEventListener('click',function(){
    currentSongIndex=(currentSongIndex-1+playlist.length)%playlist.length;loadSong(currentSongIndex);
    if(isPlaying)currentAudio.play().catch(function(){});
  });
  nextBtn.addEventListener('click',function(){
    currentSongIndex=(currentSongIndex+1)%playlist.length;loadSong(currentSongIndex);
    if(isPlaying)currentAudio.play().catch(function(){});
  });
  progressBar.addEventListener('click',function(e){
    if(!playlist[currentSongIndex].url)return;
    var rect=progressBar.getBoundingClientRect();
    var pct=(e.clientX-rect.left)/rect.width;
    currentAudio.currentTime=pct*currentAudio.duration;
  });
})();
</script>
</body>
</html>
