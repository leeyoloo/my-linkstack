<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的链接页</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      padding: 20px;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .container {
      width: 100%;
      max-width: 420px;
    }
    
    .profile {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2);
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: white;
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(102, 126, 234, 0.5);
    }
    
    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .name {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    
    .bio {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      line-height: 1.6;
      max-width: 300px;
      margin: 0 auto;
    }
    
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .link-card:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    
    .link-card:hover::before {
      opacity: 1;
    }
    
    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    
    .link-info {
      flex: 1;
      min-width: 0;
    }
    
    .link-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 2px;
    }
    
    .link-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    
    .link-arrow {
      color: rgba(255,255,255,0.3);
      font-size: 18px;
      transition: transform 0.3s ease;
    }
    
    .link-card:hover .link-arrow {
      transform: translateX(4px);
      color: rgba(255,255,255,0.7);
    }
    
    /* Icon colors */
    .icon-github { background: #24292e; }
    .icon-twitter { background: #1da1f2; }
    .icon-bilibili { background: #00a1d6; }
    .icon-email { background: #ea4335; }
    .icon-blog { background: #ff6b35; }
    .icon-wechat { background: #07c160; }
    .icon-zhihu { background: #0084ff; }
    .icon-juejin { background: #1e80ff; }
    .icon-telegram { background: #0088cc; }
    .icon-discord { background: #5865f2; }
    .icon-youtube { background: #ff0000; }
    .icon-linkedin { background: #0077b5; }
    .icon-resume { background: #8b5cf6; }
    .icon-project { background: #10b981; }
    .icon-default { background: #6b7280; }
    
    .footer {
      text-align: center;
      margin-top: 32px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
    }
    
    .footer a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
    }
    
    .footer a:hover {
      color: rgba(255,255,255,0.7);
    }
    
    /* Social icons row */
    .social-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 24px;
    }
    
    .social-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    
    .social-icon:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }
    
    /* Entrance animation */
    .link-card {
      opacity: 0;
      animation: slideUp 0.5s ease forwards;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .link-card:nth-child(1) { animation-delay: 0.1s; }
    .link-card:nth-child(2) { animation-delay: 0.15s; }
    .link-card:nth-child(3) { animation-delay: 0.2s; }
    .link-card:nth-child(4) { animation-delay: 0.25s; }
    .link-card:nth-child(5) { animation-delay: 0.3s; }
    .link-card:nth-child(6) { animation-delay: 0.35s; }
    .link-card:nth-child(7) { animation-delay: 0.4s; }
    .link-card:nth-child(8) { animation-delay: 0.45s; }
    
    .profile {
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头像和简介 -->
    <div class="profile">
      <div class="avatar">
        <!-- 👇 把这里换成你的真实头像 URL -->
        <!-- <img src="https://github.com/your-username.png" alt="avatar"> -->
        🧑‍💻
      </div>
      <h1 class="name">你的名字</h1>
      <p class="bio">在这里写一段自我介绍 ✨<br>Developer · Creator · Dreamer</p>
    </div>
    
    <!-- 链接列表 -->
    <div class="links">
      <!-- 👇 按需修改：href 是链接地址，icon 是图标类名 -->
      <a href="https://github.com/your-username" target="_blank" class="link-card">
        <div class="link-icon icon-github">🐙</div>
        <div class="link-info">
          <div class="link-title">GitHub</div>
          <div class="link-desc">我的开源项目和代码</div>
        </div>
        <span class="link-arrow">→</span>
      </a>
      
      <a href="https://your-blog.com" target="_blank" class="link-card">
        <div class="link-icon icon-blog">📝</div>
        <div class="link-info">
          <div class="link-title">博客</div>
          <div class="link-desc">技术分享与生活记录</div>
        </div>
        <span class="link-arrow">→</span>
      </a>
      
      <a href="https://twitter.com/your-username" target="_blank" class="link-card">
        <div class="link-icon icon-twitter">🐦</div>
        <div class="link-info">
          <div class="link-title">Twitter / X</div>
          <div class="link-desc">日常碎碎念</div>
        </div>
        <span class="link-arrow">→</span>
      </a>
      
      <a href="https://space.bilibili.com/xxx" target="_blank" class="link-card">
        <div class="link-icon icon-bilibili">📺</div>
        <div class="link-info">
          <div class="link-title">B 站</div>
          <div class="link-desc">视频内容</div>
        </div>
        <span class="link-arrow">→</span>
      </a>
      
      <a href="https://t.me/your-username" target="_blank" class="link-card">
        <div class="link-icon icon-telegram">✈️</div>
        <div class="link-info">
          <div class="link-title">Telegram</div>
          <div class="link-desc">即时联系</div>
        </div>
        <span class="link-arrow">→</span>
      </a>
      
      <a href="mailto:you@example.com" target="_blank" class="link-card">
        <div class="link-icon icon-email">📧</div>
        <div class="link-info">
          <div class="link-title">邮箱</div>
          <div class="link-desc">商务合作 / 联系我</div>
        </div>
        <span class="link-arrow">→</span>
      </a>
      
      <a href="https://your-project.com" target="_blank" class="link-card">
        <div class="link-icon icon-project">🚀</div>
        <div class="link-info">
          <div class="link-title">我的项目</div>
          <div class="link-desc">最近在做的东西</div>
        </div>
        <span class="link-arrow">→</span>
      </a>
      
      <!-- 需要更多链接？复制上面的 a 块，改 icon 类名即可 -->
    </div>
    
    <!-- 底部 -->
    <div class="footer">
      <p>Made with ❤️ · <a href="https://github.com/your-username" target="_blank">@your-username</a></p>
    </div>
  </div>
</body>
</html>
