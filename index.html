<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>leeyolo · links</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
--bg-primary:#f0f4ff;--bg-glass:rgba(255,255,255,0.72);--bg-glass-hover:rgba(255,255,255,0.9);
--border-glass:rgba(99,179,237,0.18);--border-glass-hover:rgba(99,179,237,0.4);
--text-primary:#1a202c;--text-secondary:rgba(74,85,104,0.85);--text-muted:rgba(113,128,150,0.55);
--accent:#3182ce;--accent-glow:rgba(49,130,206,0.28);--accent2:#00b5d8;
--counter-bg:rgba(49,130,206,0.06);--counter-border:rgba(49,130,206,0.18);
--card-shadow:0 8px 32px rgba(49,130,206,0.09),0 0 0 1px rgba(49,130,206,0.07);
--card-shadow-hover:0 16px 48px rgba(49,130,206,0.15),0 0 0 1px rgba(49,130,206,0.18);
--music-bg:rgba(255,255,255,0.94);
}
[data-theme="dark"]{
--bg-primary:#050714;--bg-glass:rgba(10,15,46,0.65);--bg-glass-hover:rgba(15,25,70,0.78);
--border-glass:rgba(99,179,237,0.12);--border-glass-hover:rgba(99,179,237,0.28);
--text-primary:#e2e8f0;--text-secondary:rgba(148,163,184,0.85);--text-muted:rgba(148,163,184,0.5);
--accent:#63b3ed;--accent-glow:rgba(99,179,237,0.32);--accent2:#76e4f7;
--counter-bg:rgba(99,179,237,0.08);--counter-border:rgba(99,179,237,0.18);
--card-shadow:0 8px 32px rgba(0,0,0,0.38),0 0 0 1px rgba(99,179,237,0.07);
--card-shadow-hover:0 16px 48px rgba(0,0,0,0.55),0 0 0 1px rgba(99,179,237,0.2);
--music-bg:rgba(10,15,46,0.94);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:"DM Sans","Noto Sans SC",sans-serif;min-height:100vh;background:var(--bg-primary);color:var(--text-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 120px;overflow-x:hidden;transition:background .5s,color .4s;position:relative}

/* MUSIC MODE: split layout */
body.music-mode{display:flex;flex-direction:row;padding:40px 60px;gap:60px;align-items:center;justify-content:center;min-height:100vh}
body.music-mode .main-container{width:400px;max-width:45vw;flex-shrink:0;position:relative;z-index:10}
body.music-mode .music-panel{
  width:380px;max-width:50vw;
  display:flex;flex-direction:column;align-items:center;gap:28px;
  z-index:60;opacity:0;transform:translateX(30px);
  transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);
  pointer-events:none;flex-shrink:0;
}
#coverBg.active{opacity:1}
#coverBgImg{position:absolute;inset:-15%;width:130%;height:130%;object-fit:cover;filter:blur(60px) brightness(0.4) saturate(1.4);transform:scale(1.1)}
#coverGlow1,#coverGlow2{position:absolute;inset:0;transition:background 2s ease}
#coverOverlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,7,20,0.15) 0%,rgba(5,7,20,0.8) 100%)}

/* PARTICLES */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;transition:opacity .8s}
#particles.dimmed{opacity:.12}
.bg-orbs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:orbFloat 20s ease-in-out infinite}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,#63b3ed,transparent 70%);top:-150px;left:-100px}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,#76e4f7,transparent 70%);bottom:-100px;right:-80px;animation-delay:-7s}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,#9f7aea,transparent 70%);top:40%;left:60%;animation-delay:-14s}
[data-theme="dark"] .orb{opacity:0.15}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(40px,-30px) scale(1.05)}50%{transform:translate(-20px,40px) scale(0.95)}75%{transform:translate(30px,20px) scale(1.02)}}

/* LYRICS + COVER RIGHT PANEL */
.music-panel{
  position:fixed;right:60px;top:50%;transform:translateY(-50%);
  width:360px;max-width:calc(100vw - 40px);
  display:flex;flex-direction:column;align-items:center;gap:28px;
  z-index:60;opacity:0;transform:translateY(-50%) translateX(30px);
  transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.music-panel-inner{
  display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;
}

/* Large album cover */
.panel-cover-wrap{position:relative;flex-shrink:0}
.panel-cover-ring{
  position:absolute;inset:-6px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);
  animation:panelRingSpin 12s linear infinite;
}
@keyframes panelRingSpin{to{transform:rotate(360deg)}}
.panel-cover{
  width:200px;height:200px;border-radius:50%;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.1);
  position:relative;display:flex;align-items:center;justify-content:center;
  font-size:64px;background:linear-gradient(135deg,#63b3ed,#76e4f7);
  transition:transform .3s;
}
.panel-cover.playing{animation:panelCoverPulse 3s ease-in-out infinite}
@keyframes panelCoverPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.panel-cover img{width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;inset:0}
.panel-cover .cover-glow{
  position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 70%);
  animation:coverGlowPulse 3s ease-in-out infinite;
}
@keyframes coverGlowPulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}

/* Song info */
.panel-song-info{text-align:center}
.panel-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.3px;margin-bottom:4px;text-shadow:0 2px 12px rgba(0,0,0,0.4)}
.panel-artist{font-size:14px;color:rgba(255,255,255,0.6);letter-spacing:.5px}

/* Lyrics in panel */
.panel-lyrics-container{
  width:100%;max-height:200px;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;-ms-overflow-style:none;
  padding:0 10px;
}
.panel-lyrics-container::-webkit-scrollbar{display:none}
.panel-lyric-line{
  font-size:16px;font-weight:400;color:rgba(255,255,255,0.3);
  line-height:2.4;letter-spacing:.3px;text-align:center;
  transition:all .5s cubic-bezier(.4,0,.2,1);padding:2px 8px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.panel-lyric-line.active{
  font-size:20px;font-weight:700;color:#fff;
  text-shadow:0 0 30px rgba(255,255,255,0.5),0 2px 12px rgba(0,0,0,0.4);
  letter-spacing:.5px;
}

/* Color bar animation on lyrics panel */
.panel-lyrics-glow{
  width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  border-radius:1px;margin-top:4px;position:relative;overflow:hidden;
}
.panel-lyrics-glow::after{
  content:'';position:absolute;top:0;left:0;height:100%;width:0%;
  background:linear-gradient(90deg,var(--accent2,#76e4f7),#fff,var(--accent2,#76e4f7));
  border-radius:1px;
  transition:width .5s linear;
}
.panel-lyrics-glow.playing::after{width:100%;transition:width .5s linear}

/* Progress in panel */
.panel-progress-wrap{width:100%;padding:0 4px}
.panel-progress-bar{width:100%;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden;cursor:pointer}
.panel-progress-fill{height:100%;background:linear-gradient(90deg,rgba(255,255,255,0.5),#fff);border-radius:2px;width:0;transition:width .2s linear}
.panel-time{font-family:"JetBrains Mono",monospace;font-size:11px;color:rgba(255,255,255,0.4);margin-top:6px;display:flex;justify-content:space-between}

/* Mini controls */
.panel-controls{display:flex;align-items:center;gap:12px}
.panel-btn{width:40px;height:40px;border:none;border-radius:50%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.1);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:16px}
.panel-btn:hover{background:rgba(255,255,255,0.25);transform:scale(1.05)}
.panel-btn.play{width:52px;height:52px;background:rgba(255,255,255,0.9);color:#111;font-size:20px}
.panel-btn.play:hover{background:#fff;transform:scale(1.08)}

/* PAGE ENTRANCE */
.page-entrance{position:fixed;inset:0;z-index:9999;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;transition:opacity .8s ease,visibility .8s}
.page-entrance.done{opacity:0;visibility:hidden;pointer-events:none}
.page-entrance-logo{font-size:48px;font-weight:700;color:var(--accent);opacity:0;transform:scale(0.5);animation:entranceLogo 1s .3s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes entranceLogo{to{opacity:1;transform:scale(1)}}
.page-entrance-bar{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;animation:entranceBar 1.5s .5s ease forwards}
@keyframes entranceBar{to{width:100%}}

/* MAIN */
.main-container{position:relative;z-index:10;width:100%;max-width:440px}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;animation:fadeSlideDown .6s 1.6s ease both}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.theme-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;position:relative}
.toggle-label{font-size:12px;font-weight:500;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;transition:color .3s;min-width:28px}
.toggle-switch{width:52px;height:28px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:14px;position:relative;backdrop-filter:blur(16px);transition:all .3s;cursor:pointer}
.toggle-switch:hover{border-color:var(--border-glass-hover)}
.toggle-knob{width:20px;height:20px;background:var(--accent);border-radius:50%;position:absolute;top:3px;left:4px;transition:all .35s cubic-bezier(.68,-.55,.27,1.55);box-shadow:0 0 8px var(--accent-glow)}
[data-theme="dark"] .toggle-knob{left:4px}
[data-theme="light"] .toggle-knob{left:calc(100% - 24px)}
.toggle-key{position:absolute;right:-32px;top:50%;transform:translateY(-50%);background:var(--counter-bg);border:1px solid var(--counter-border);border-radius:4px;padding:1px 5px;font-size:10px;font-family:"JetBrains Mono",monospace;color:var(--text-muted);opacity:.6}
.page-views-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--counter-bg);border:1px solid var(--counter-border);border-radius:20px;backdrop-filter:blur(16px);font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:500;color:var(--accent);transition:all .3s;animation:fadeSlideDown .6s 1.8s ease both}
.page-views-badge svg{width:12px;height:12px;flex-shrink:0}

/* PROFILE CARD */
.profile-card{background:var(--bg-glass);backdrop-filter:blur(40px);border:1px solid var(--border-glass);border-radius:28px;padding:40px 32px 36px;text-align:center;margin-bottom:24px;box-shadow:var(--card-shadow);position:relative;overflow:hidden;transition:all .4s;animation:cardReveal .7s 1.9s ease both}
@keyframes cardReveal{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.profile-card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent-glow),transparent)}
.profile-card::after{content:"";position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:180px;height:180px;background:radial-gradient(circle,var(--accent-glow),transparent 70%);pointer-events:none;opacity:.5;transition:opacity .4s}
.profile-card:hover::after{opacity:.8}
.avatar-wrap{position:relative;display:inline-block;margin-bottom:20px}
.avatar-ring{position:absolute;inset:-4px;border-radius:50%;border:2px solid transparent;background:linear-gradient(var(--bg-primary),var(--bg-primary)) padding-box,linear-gradient(135deg,var(--accent),var(--accent2)) border-box;animation:ringRotate 8s linear infinite}
@keyframes ringRotate{to{transform:rotate(360deg)}}
.avatar{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;position:relative;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;box-shadow:0 4px 24px var(--accent-glow);overflow:hidden;user-select:none}
.avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;position:absolute;top:0;left:0;z-index:1;opacity:0;transition:opacity .4s}
.avatar.ready img{opacity:1}
.avatar-emoji{z-index:0;transition:opacity .4s}
.avatar.ready .avatar-emoji{opacity:0}
.avatar:hover{transform:scale(1.08) rotate(2deg);box-shadow:0 8px 40px var(--accent-glow)}
.name{font-size:26px;font-weight:700;color:var(--text-primary);margin-bottom:10px;letter-spacing:-.5px;line-height:1.2}
.bio{font-size:14px;color:var(--text-secondary);line-height:1.7;max-width:280px;margin:0 auto}
.tags{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:16px}
.tag{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;background:var(--counter-bg);border:1px solid var(--counter-border);color:var(--accent);letter-spacing:.2px;transition:all .3s}

/* LINKS */
.links{display:flex;flex-direction:column;gap:12px}
.link-card{display:flex;align-items:center;gap:14px;padding:16px 20px;background:var(--bg-glass);backdrop-filter:blur(24px);border:1px solid var(--border-glass);border-radius:18px;text-decoration:none;color:var(--text-primary);transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;box-shadow:var(--card-shadow);opacity:0;animation:linkReveal .5s ease forwards;cursor:pointer}
@keyframes linkReveal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.link-card:nth-child(1){animation-delay:2.0s}.link-card:nth-child(2){animation-delay:2.08s}.link-card:nth-child(3){animation-delay:2.16s}.link-card:nth-child(4){animation-delay:2.24s}.link-card:nth-child(5){animation-delay:2.32s}.link-card:nth-child(6){animation-delay:2.40s}
.link-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-glow),transparent);opacity:0;transition:opacity .3s}
.link-card:hover{transform:translateY(-3px);background:var(--bg-glass-hover);border-color:var(--border-glass-hover);box-shadow:var(--card-shadow-hover)}
.link-card:hover::before{opacity:1}
.link-card::after{content:"";position:absolute;top:0;left:-100%;width:60px;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);transition:left .5s}
.link-card:hover::after{left:200%}
.ripple{position:absolute;border-radius:50%;background:rgba(99,179,237,.3);transform:scale(0);animation:rippleAnim .6s ease-out forwards;pointer-events:none}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}
.link-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative;z-index:1;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.link-card:hover .link-icon{transform:scale(1.12) rotate(-5deg)}
.link-info{flex:1;min-width:0;position:relative;z-index:1}
.link-title{font-weight:600;font-size:15px;margin-bottom:2px;color:var(--text-primary)}
.link-desc{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-arrow{color:var(--text-muted);font-size:18px;position:relative;z-index:1;transition:all .3s;flex-shrink:0;display:flex;align-items:center}
.link-card:hover .link-arrow{transform:translateX(5px);color:var(--accent)}
.icon-github{background:#24292e}.icon-twitter{background:#1da1f2}.icon-bilibili{background:linear-gradient(135deg,#00a1d6,#fb7299)}.icon-email{background:#ea4335}.icon-blog{background:linear-gradient(135deg,#ff6b35,#f7c000)}.icon-telegram{background:linear-gradient(135deg,#0088cc,#0080ff)}.icon-discord{background:#5865f2}.icon-default{background:#6b7280}.icon-music{background:linear-gradient(135deg,#1db954,#1ed760)}.icon-project{background:linear-gradient(135deg,#10b981,#059669)}
.keyboard-hint{text-align:center;margin-top:20px;font-size:11px;color:var(--text-muted);letter-spacing:.5px;animation:fadeSlideUp .7s 2.5s ease both;opacity:0}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.kbd{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;border-radius:4px;background:var(--counter-bg);border:1px solid var(--counter-border);font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--accent);margin:0 2px}

/* MUSIC PLAYER BAR */
.music-player{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--music-bg);backdrop-filter:blur(40px) saturate(1.8);border-top:1px solid var(--border-glass);padding:0 20px;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1)}
.music-player.visible{transform:translateY(0)}
.music-player-inner{max-width:440px;margin:0 auto;display:flex;align-items:center;gap:12px;height:64px}
.music-cover{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#63b3ed,#76e4f7);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;transition:transform .3s;position:relative}
.music-cover.playing{animation:coverPulse 2s ease-in-out infinite}
@keyframes coverPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.music-cover img{width:100%;height:100%;object-fit:cover;border-radius:10px;position:absolute;inset:0}
.music-info{flex:1;min-width:0}
.music-title{font-size:13px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-artist{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.music-progress-bar{width:100%;height:3px;background:var(--counter-border);border-radius:2px;margin-top:6px;overflow:hidden;cursor:pointer}
.music-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;width:0;transition:width .2s linear}
.music-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.music-btn{width:36px;height:36px;border:none;border-radius:50%;background:var(--counter-bg);border:1px solid var(--counter-border);color:var(--text-primary);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:14px}
.music-btn:hover{background:var(--accent);color:white;border-color:var(--accent)}
.music-btn.play-btn{width:40px;height:40px;background:var(--accent);color:white;border-color:var(--accent);box-shadow:0 4px 16px var(--accent-glow)}
.music-btn.play-btn:hover{transform:scale(1.08);box-shadow:0 6px 24px var(--accent-glow)}
.music-close{position:absolute;top:-14px;right:0;width:24px;height:24px;border-radius:50%;background:var(--counter-bg);border:1px solid var(--counter-border);color:var(--text-muted);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .2s}
.music-player.visible .music-close{display:flex}
.music-close:hover{background:var(--accent);color:white;border-color:var(--accent)}
.music-toggle-btn{position:fixed;bottom:80px;right:20px;z-index:99;width:48px;height:48px;border-radius:50%;background:var(--bg-glass);backdrop-filter:blur(20px);border:1px solid var(--border-glass);color:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;box-shadow:0 4px 24px rgba(0,0,0,.25);transition:all .3s cubic-bezier(.4,0,.2,1);animation:btnPop .6s 2.6s ease forwards;opacity:0;transform:scale(.8)}
@keyframes btnPop{to{opacity:1;transform:scale(1)}}
.music-toggle-btn:hover{transform:scale(1.1);border-color:var(--border-glass-hover);box-shadow:0 8px 32px rgba(0,0,0,.3),0 0 20px var(--accent-glow)}
.music-toggle-btn.playing{background:var(--accent);color:white;border-color:var(--accent);box-shadow:0 4px 24px var(--accent-glow)}
.music-toggle-btn.hidden{display:none}
.music-toggle-btn .kbd-hint{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text-muted);white-space:nowrap;font-family:"JetBrains Mono",monospace}

/* FOOTER & TOAST */
.footer{text-align:center;margin-top:32px;font-size:12px;color:var(--text-muted);animation:fadeSlideUp .7s 2.6s ease both;opacity:0}
.footer a{color:var(--accent);text-decoration:none;font-weight:500;transition:color .2s}
.footer a:hover{color:var(--accent2);text-decoration:underline}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-glass);backdrop-filter:blur(20px);border:1px solid var(--border-glass);border-radius:12px;padding:10px 20px;font-size:13px;color:var(--text-primary);opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  body.music-mode{justify-content:flex-start;padding-top:20px}
  .panel-cover{width:160px;height:160px;font-size:48px}
}

<script>
(function(){
  var entrance=document.getElementById("pageEntrance");

  var canvas=document.getElementById("particles");
  var ctx=canvas.getContext("2d");
  var W,H,particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function createParticles(){
    particles=[];
    for(var i=0;i<Math.min(Math.floor(W*H/12000),100);i++){
      particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.5,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,alpha:Math.random()*0.5+0.2});
    }
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    var isDark=document.documentElement.dataset.theme==="dark";
    var color=isDark?"99,179,237":"49,130,206";
    for(var i=0;i<particles.length;i++){
      for(var j=i+1;j<particles.length;j++){
        var dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<140){ctx.beginPath();ctx.strokeStyle="rgba("+color+","+(0.12*(1-dist/140))+")";ctx.lineWidth=0.5;ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();}
      }
    }
    particles.forEach(function(p){
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="rgba("+color+","+p.alpha+")";ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
    });
    requestAnimationFrame(draw);
  }
  resize();createParticles();draw();
  window.addEventListener("resize",function(){resize();createParticles();});

  var toggle=document.getElementById("themeToggle");
  var label=document.getElementById("themeLabel");
  function syncLabel(){label.textContent=document.documentElement.dataset.theme==="dark"?"\u6697\u8272":"\u4eae\u8272";}
  toggle.addEventListener("click",function(){
    var isDark=document.documentElement.dataset.theme==="dark";
    document.documentElement.dataset.theme=isDark?"light":"dark";
    syncLabel();localStorage.setItem("theme",document.documentElement.dataset.theme);
  });
  var saved=localStorage.getItem("theme");
  if(saved){document.documentElement.dataset.theme=saved;}
  syncLabel();

  var el=document.getElementById("viewCount");
  var key="leeyolo_views_v7";

  el.textContent=count;

  var toast=document.getElementById("toast");

  document.querySelectorAll(".link-card").forEach(function(card){

      setTimeout(function(){ripple.remove();},600);
    });

  /* ===== MUSIC + SPLIT LAYOUT ===== */

  var panelProgressFill=document.getElementById("panelProgressFill");
  var panelProgressBar=document.getElementById("panelProgressBar");
  var panelLyrics=document.getElementById("panelLyrics");
  var panelLyricsGlow=document.getElementById("panelLyricsGlow");
  var panelPlayBtn=document.getElementById("panelPlayBtn");
  var panelPrevBtn=document.getElementById("panelPrevBtn");
  var panelNextBtn=document.getElementById("panelNextBtn");
  var panelTimeCurrent=document.getElementById("panelTimeCurrent");
  var panelTimeTotal=document.getElementById("panelTimeTotal");

  var LYRICS=[[0.86,"那天下雨了"],[2.28,"词：周杰伦"],[2.88,"曲：周杰伦"],[29.14,"车子缓缓的开 你慢慢走来"],[32.38,"我竟然看着你发呆"],[35.59,"你尴尬Say个Hi 没位坐下来"],[38.9,"我想叫旁边的离开"],[41.97,"我车票都还在 心却在窗外"],[45.4,"因为你已下了站台"],[48.54,"远远的看着你点点头车已开"],[51.77,"你一句话我爬窗离开"],[55.03,"你证件掉了出来 我才明白"],[58.37,"是那隔壁班的女孩"],[61.53,"这么多年彼此竟然没认出来"],[64.69,"是你变美还是我变帅"],[67.95,"你经过花就开 离开雨就来"],[71.3,"这里适合谈个恋爱"],[74.35,"如果我要一个梦幻的开场白"],[77.64,"没有比你更美的对白"],[81.42,"雪白的天空等待彩虹出现"],[86.36,"（彩虹出现）"],[87.96,"你我的遇见是谁许的愿"],[92.79,"（谁许的愿）"],[94.51,"黑黑的夜空繁星变得耀眼"],[99.37,"（变得耀眼）"],[100.65,"因为你出现在我身边"],[106.83,"你老家有点远 但我有点闲"],[110.27,"也许能陪你走一圈"],[113.29,"把你的父母都见 吃几口麻酱面"],[116.68,"也许还能打个几圈 （我胡了）"],[120.01,"乡间的麦芽田 害羞的脸"],[123.19,"你提到多年前的暗恋"],[126.27,"妳剪下校园毕业册的那一页"],[129.53,"是因为我在照片里面"],[133.39,"雪白的天空等待彩虹出现"],[138.22,"（彩虹出现）"],[139.88,"你我的遇见是谁许的愿"],[144.68,"（谁许的愿）"],[146.41,"黑黑的夜空繁星变得耀眼"],[151.22,"（变得耀眼）"],[152.55,"因为你出现在我身边"],[159,"原来多年前在那个书店"],[162.24,"借我课本的是你"],[165.34,"原来看我被雨淋的那天"],[168.62,"帮我撑伞也是你"],[178.24,"翘课的那一天 花落那一天"],[181.6,"教室那间我已看见"],[184.63,"消失的下雨天 我想再淋一遍"],[188,"我应该对你唱着晴天"],[191.24,"送你到家门外 我才明白"],[194.52,"原来你早已有人疼爱"],[197.58,"如果回到过去那一个下雨天"],[200.88,"我会为了你把伞撑开"],[204.22,"如果回到过去那一个下雨天"],[207.39,"我绝不再 转身离开"]];

  function renderLyrics(){
    panelLyrics.innerHTML="";
    LYRICS.forEach(function(item){
      var div=document.createElement("div");
      div.className="panel-lyric-line";
      div.textContent=item[1]||"\u00a0";
      div.dataset.time=item[0];
      panelLyrics.appendChild(div);
    });
  }
  renderLyrics();

  function extractColor(img){
    try{
      var c=document.createElement("canvas");c.width=1;c.height=1;
      var ctx=c.getContext("2d");
      ctx.drawImage(img,0,0,1,1);
      var d=ctx.getImageData(0,0,1,1).data;
      var r=d[0],g=d[1],b=d[2];
      coverGlow1.style.background="radial-gradient(ellipse 80% 60% at 30% 40%,rgba("+r+","+g+","+b+",0.55),transparent 70%)";
      coverGlow2.style.background="radial-gradient(ellipse 70% 80% at 70% 65%,rgba("+(r-20)+","+(g-30)+","+(b+40)+",0.45),rgba(40,20,80,0.2),transparent 75%)";
    }catch(e){}
  }

  var coverImgLoaded=false;
  var currentLyricIdx=-1;
  var lyricsVisible=false;

  function formatTime(s){
    if(!s||isNaN(s))return"0:00";
    var m=Math.floor(s/60);
    var sec=Math.floor(s%60);
    return m+":"+(sec<10?"0":"")+sec;
  }

  function showMusicMode(){
    coverBg.classList.add("active");
    particlesEl.classList.add("dimmed");
    musicPanel.classList.add("active");
    document.body.classList.add("music-mode");
    if(!coverImgLoaded){
      coverBgImg.onload=function(){extractColor(coverBgImg);coverImgLoaded=true;};
      coverBgImg.onerror=function(){
        coverGlow1.style.background="radial-gradient(ellipse 80% 60% at 30% 40%,rgba(200,80,100,0.55),transparent 70%)";
        coverGlow2.style.background="radial-gradient(ellipse 70% 80% at 70% 65%,rgba(80,50,160,0.45),transparent 75%)";
      };
    }
  }

  function hideMusicMode(){
    coverBg.classList.remove("active");
    particlesEl.classList.remove("dimmed");
    musicPanel.classList.remove("active");
    document.body.classList.remove("music-mode");
    currentLyricIdx=-1;
    renderLyrics();
  }

  function updateLyrics(currentTime){
    var idx=LYRICS.length-1;
    for(var i=0;i<LYRICS.length;i++){if(currentTime>=LYRICS[i][0])idx=i;}
    if(idx!==currentLyricIdx){
      currentLyricIdx=idx;
      var lines=panelLyrics.querySelectorAll(".panel-lyric-line");
      lines.forEach(function(line,i){
        if(i===idx){
          line.classList.add("active");
          setTimeout(function(){line.scrollIntoView({behavior:"smooth",block:"center"});},50);
        } else {
          line.classList.remove("active");
        }
      });
    }
  }

  var PLAYLIST=[
    {
      title:"\u90a3\u5929\u4e0b\u96e8\u4e86",
      artist:"\u5468\u6770\u4f26",
      coverEmoji:"\u2614",
      coverImg:"https://raw.githubusercontent.com/leeyoloo/my-linkstack/main/images/cover.jpg",
      url:"https://raw.githubusercontent.com/leeyoloo/my-linkstack/main/audio/%E5%91%A8%E6%9D%B0%E4%BC%A6-%E9%82%A3%E5%A4%A9%E4%B8%8B%E9%9B%A8%E4%BA%86.mp3"
    }
  ];

  var currentAudio=new Audio();
  var isPlaying=false;
  var currentSongIndex=0;

  /* Bottom bar elements */
  var btn=document.getElementById("musicToggleBtn");
  var panel=document.getElementById("musicPlayer");
  var closeBtn=document.getElementById("musicCloseBtn");
  var playBtn=document.getElementById("musicPlayBtn");
  var prevBtn=document.getElementById("musicPrevBtn");
  var nextBtn=document.getElementById("musicNextBtn");
  var miniCover=document.getElementById("musicCover");
  var miniTitle=document.getElementById("musicTitle");
  var miniArtist=document.getElementById("musicArtist");
  var miniProgressFill=document.getElementById("musicProgressFill");
  var miniProgressBar=document.getElementById("musicProgressBar");

  function showPanel(){panel.classList.add("visible");btn.classList.add("hidden");}
  function hidePanel(){
    panel.classList.remove("visible");btn.classList.remove("hidden");
    if(currentAudio){currentAudio.pause();}
    isPlaying=false;
    playBtn.innerHTML="\u25b6";
    panelPlayBtn.innerHTML="\u25b6";
    miniCover.classList.remove("playing");btn.classList.remove("playing");
    panelCover.classList.remove("playing");
    panelLyricsGlow.classList.remove("playing");
    hideMusicMode();
  }

  function loadSong(index){
    var song=PLAYLIST[index];
    miniTitle.textContent=song.title;
    miniArtist.textContent=song.artist;
    panelTitle.textContent=song.title;
    panelArtist.textContent=song.artist;
    panelCoverEmoji.textContent=song.coverEmoji;
    panelCoverEmoji.style.display="block";
    panelCoverImg.style.display="none";
    var img=new Image();
    img.crossOrigin="anonymous";
    img.src=song.coverImg;
    img.onload=function(){
      panelCoverEmoji.style.display="none";
      panelCoverImg.src=song.coverImg;
      panelCoverImg.style.display="block";
      extractColor(img);
      coverBgImg.src=song.coverImg;
      coverImgLoaded=true;
    };
    img.onerror=function(){
      panelCoverEmoji.style.display="block";
      panelCoverImg.style.display="none";
    };
    coverBgImg.src=song.coverImg;
    coverImgLoaded=false;
    miniCover.textContent=song.coverEmoji;
    if(song.url){currentAudio.src=song.url;currentAudio.load();}
    currentLyricIdx=-1;
    renderLyrics();
    miniProgressFill.style.width="0%";
    panelProgressFill.style.width="0%";
    panelTimeCurrent.textContent="0:00";
    panelTimeTotal.textContent="0:00";
  }

  function togglePlay(){
    if(isPlaying){
      currentAudio.pause();
      playBtn.innerHTML="\u25b6";
      panelPlayBtn.innerHTML="\u25b6";
      miniCover.classList.remove("playing");
      panelCover.classList.remove("playing");
      panelLyricsGlow.classList.remove("playing");

      currentAudio.play().catch(function(){});
      playBtn.innerHTML="\u23f8";
      panelPlayBtn.innerHTML="\u23f8";
      miniCover.classList.add("playing");
      panelCover.classList.add("playing");
      panelLyricsGlow.classList.add("playing");
      btn.classList.add("playing");
      showMusicMode();
      lyricsVisible=true;
    }
    isPlaying=!isPlaying;
  }

  btn.addEventListener("click",function(){
    showPanel();
    loadSong(currentSongIndex);
    if(!isPlaying)togglePlay();
  });
  closeBtn.addEventListener("click",hidePanel);
  playBtn.addEventListener("click",togglePlay);
  panelPlayBtn.addEventListener("click",togglePlay);

  currentAudio.addEventListener("timeupdate",function(){
    var dur=currentAudio.duration||0;
    var cur=currentAudio.currentTime||0;
    var pct=dur?((cur/dur)*100):0;
    miniProgressFill.style.width=pct+"%";
    panelProgressFill.style.width=pct+"%";
    panelTimeCurrent.textContent=formatTime(cur);
    panelTimeTotal.textContent=formatTime(dur);
    if(lyricsVisible){updateLyrics(cur);}
  });

  currentAudio.addEventListener("ended",function(){
    currentSongIndex=(currentSongIndex+1)%PLAYLIST.length;
    loadSong(currentSongIndex);
    if(isPlaying)currentAudio.play().catch(function(){});
  });

  prevBtn.addEventListener("click",function(){
    currentSongIndex=(currentSongIndex-1+PLAYLIST.length)%PLAYLIST.length;
    loadSong(currentSongIndex);
    if(isPlaying)currentAudio.play().catch(function(){});
  });
  nextBtn.addEventListener("click",function(){
    currentSongIndex=(currentSongIndex+1)%PLAYLIST.length;
    loadSong(currentSongIndex);
    if(isPlaying)currentAudio.play().catch(function(){});
  });
  panelPrevBtn.addEventListener("click",function(){
    currentSongIndex=(currentSongIndex-1+PLAYLIST.length)%PLAYLIST.length;
    loadSong(currentSongIndex);
    if(isPlaying)currentAudio.play().catch(function(){});
  });
  panelNextBtn.addEventListener("click",function(){
    currentSongIndex=(currentSongIndex+1)%PLAYLIST.length;
    loadSong(currentSongIndex);
    if(isPlaying)currentAudio.play().catch(function(){});
  });

  function seekAudio(e,bar,fill){
    if(!currentAudio.src)return;
    var rect=bar.getBoundingClientRect();
    var pct=(e.clientX-rect.left)/rect.width;
    currentAudio.currentTime=pct*currentAudio.duration;
  }
  miniProgressBar.addEventListener("click",function(e){seekAudio(e,this,miniProgressFill);});
  panelProgressBar.addEventListener("click",function(e){seekAudio(e,this,panelProgressFill);});

  document.addEventListener("keydown",function(e){
    var tag=e.target.tagName;
    if(tag==="INPUT"||tag==="TEXTAREA")return;
    var key=e.key.toUpperCase();
    if(key==="D"){
      toggle.click();
      showToast(document.documentElement.dataset.theme==="dark"?"\u5df2\u5207\u6362\u4e3a\u6697\u8272":"\u5df2\u5207\u6362\u4e3a\u4eae\u8272",1500);
    }
    if(key==="M"){
      if(panel.classList.contains("visible")){hidePanel();}else{btn.click();}
    }
  });

})();
</script>
</body>
</html>

</div>
