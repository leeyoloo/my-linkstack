<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>灵界 LingVerse - 修仙世界</title>
    <style>
        :root {
            --bg-primary: #0a0f1c;
            --bg-secondary: #12172a;
            --bg-card: #1a2035;
            --bg-input: #0d1220;
            --text-primary: #e8e6e3;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --text-gold: #fbbf24;
            --text-orange: #f97316;
            --text-green: #22c55e;
            --text-red: #ef4444;
            --text-blue: #3b82f6;
            --text-purple: #a855f7;
            --text-cyan: #06b6d4;
            --text-rainbow: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
            --border-color: #2d3748;
            --accent: #8b5cf6;
            --accent2: #06b6d4;
            --gradient-gold: linear-gradient(135deg, #fbbf24, #f59e0b);
            --gradient-purple: linear-gradient(135deg, #8b5cf6, #6366f1);
            --gradient-rainbow: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
        }

        .theme-light {
            --bg-primary: #f3f2f0;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f9fafb;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --border-color: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Rainbow text */
        .text-rainbow {
            background: var(--gradient-rainbow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            z-index: 1000;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: var(--gradient-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle { color: var(--text-muted); margin-bottom: 32px; font-size: 14px; }

        .login-input, .login-select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        .login-input:focus, .login-select:focus { border-color: var(--accent); }

        .login-select option { background: var(--bg-card); }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--gradient-purple);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .login-tabs { display: flex; gap: 8px; margin-bottom: 24px; }

        .login-tab {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .login-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Game Layout */
        .game-wrapper {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .game-wrapper.active { display: flex; }

        /* Header */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header-left, .header-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

        .header-logo {
            font-size: 16px;
            font-weight: 700;
            background: var(--gradient-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-realm {
            padding: 3px 8px;
            background: var(--bg-card);
            border-radius: 10px;
            font-size: 11px;
            color: var(--text-gold);
        }

        .header-time { color: var(--text-muted); font-size: 11px; }

        .header-btn {
            padding: 4px 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
        }

        .header-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .btn-logout { color: var(--text-red); }

        /* Game Body */
        .game-body { display: flex; flex: 1; overflow: hidden; }

        /* Player Panel */
        .player-panel {
            width: 220px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 10px;
            overflow-y: auto;
            flex-shrink: 0;
            font-size: 11px;
        }

        .panel-section { margin-bottom: 12px; }

        .panel-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border-color);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
        }

        .stat-label { color: var(--text-muted); }
        .stat-value { font-weight: 500; }
        .stat-value.hp { color: var(--text-red); }
        .stat-value.mp { color: var(--text-blue); }
        .stat-value.atk { color: var(--text-orange); }
        .stat-value.def { color: var(--text-cyan); }
        .stat-value.spirit { color: var(--text-purple); }
        .stat-value.gold { color: var(--text-gold); }

        .progress-container {
            position: relative;
            height: 5px;
            background: var(--bg-input);
            border-radius: 2px;
            margin-top: 3px;
        }

        .progress-bar {
            height: 100%;
            background: var(--gradient-purple);
            border-radius: 2px;
            transition: width 0.3s;
        }

        .progress-text {
            position: absolute;
            right: 3px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 9px;
            color: var(--text-muted);
        }

        /* Main Panel */
        .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .log-area {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        .log-content { max-width: 900px; margin: 0 auto; }

        .log-entry {
            padding: 5px 8px;
            margin-bottom: 5px;
            background: var(--bg-card);
            border-radius: 5px;
            border-left: 3px solid var(--border-color);
            font-size: 12px;
            line-height: 1.5;
        }

        .log-entry.event { border-left-color: var(--text-cyan); }
        .log-entry.combat { border-left-color: var(--text-red); }
        .log-entry.loot { border-left-color: var(--text-gold); }
        .log-entry.level { border-left-color: var(--text-purple); }
        .log-entry.chat { border-left-color: var(--text-blue); }
        .log-entry.sect { border-left-color: var(--text-green); }
        .log-entry.error { border-left-color: var(--text-red); background: rgba(239,68,68,0.1); }
        .log-entry.adventure { border-left-color: var(--text-orange); background: rgba(249,115,22,0.1); }
        .log-entry.tribulation { border-left-color: #ff6b6b; background: rgba(255,107,107,0.15); }

        .log-time { font-size: 10px; color: var(--text-muted); margin-right: 5px; }

        /* Action Bar */
        .action-bar {
            padding: 10px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-action {
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            color: var(--text-primary);
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-action:hover { border-color: var(--accent); }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-action.primary { background: var(--gradient-purple); border: none; color: white; }
        .btn-action.danger { border-color: var(--text-red); color: var(--text-red); }
        .btn-action.rainbow { background: var(--gradient-rainbow); border: none; color: white; font-weight: 600; }

        /* Side Panel */
        .side-panel {
            width: 320px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
        }

        .side-panel.active { display: flex; }

        .side-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .side-panel-title { font-size: 13px; font-weight: 600; }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
        }

        .side-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Panel Tabs */
        .panel-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .panel-tab {
            padding: 5px 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 10px;
            cursor: pointer;
        }

        .panel-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Inventory */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 5px;
        }

        .inventory-slot {
            aspect-ratio: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 3px;
            font-size: 9px;
        }

        .inventory-slot:hover { border-color: var(--accent); }
        .inventory-slot.empty { color: var(--text-muted); }
        .item-icon { font-size: 18px; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
        }

        .modal-actions { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }

        /* Skills */
        .skill-grid { display: flex; flex-direction: column; gap: 6px; }

        .skill-card {
            background: var(--bg-input);
            border-radius: 6px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .skill-icon {
            width: 36px;
            height: 36px;
            background: var(--gradient-purple);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .skill-info { flex: 1; }
        .skill-name { font-size: 12px; font-weight: 600; }
        .skill-desc { font-size: 10px; color: var(--text-muted); }
        .skill-level { font-size: 10px; color: var(--text-gold); }

        /* Equipment */
        .equip-slot {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .equip-slot.empty { color: var(--text-muted); }
        .equip-slot-name { flex: 1; font-size: 11px; }
        .equip-slot-stats { font-size: 10px; color: var(--text-green); }

        /* Quest */
        .quest-card {
            background: var(--bg-input);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .quest-title { font-size: 12px; font-weight: 600; color: var(--text-gold); }
        .quest-desc { font-size: 10px; color: var(--text-muted); margin: 4px 0; }
        .quest-progress { font-size: 10px; color: var(--text-cyan); }
        .quest-rewards { font-size: 10px; color: var(--text-green); margin-top: 4px; }

        /* Achievement */
        .ach-card {
            background: var(--bg-input);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ach-icon { font-size: 24px; }
        .ach-info { flex: 1; }
        .ach-name { font-size: 11px; font-weight: 600; }
        .ach-desc { font-size: 10px; color: var(--text-muted); }
        .ach.unlocked .ach-name { color: var(--text-gold); }

        /* Pet */
        .pet-card {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .pet-name { font-size: 13px; font-weight: 600; color: var(--text-cyan); }
        .pet-level { font-size: 10px; color: var(--text-muted); }
        .pet-stats { display: flex; gap: 12px; margin-top: 6px; font-size: 11px; }

        /* Adventure */
        .adventure-card {
            background: linear-gradient(135deg, rgba(249,115,22,0.1), rgba(251,191,36,0.1));
            border: 1px solid var(--text-orange);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .adventure-title { font-size: 13px; font-weight: 600; color: var(--text-orange); }
        .adventure-choices { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }

        /* Tribulation */
        .tribulation-card {
            background: linear-gradient(135deg, rgba(255,107,107,0.15), rgba(239,68,68,0.1));
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .tribulation-phase { font-size: 24px; margin: 10px 0; }
        .tribulation-progress { height: 10px; background: var(--bg-input); border-radius: 5px; overflow: hidden; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

        /* Mobile */
        @media (max-width: 900px) {
            .player-panel { display: none; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; width: 280px; }
            .player-panel.mobile-active { display: block; }
            .side-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 100%; z-index: 100; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1 class="login-title">灵界</h1>
            <p class="login-subtitle">修仙之路，由此开始</p>
            
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchLoginTab('login')">登录</button>
                <button class="login-tab" onclick="switchLoginTab('register')">创建角色</button>
            </div>

            <div id="loginForm">
                <input type="text" class="login-input" id="loginName" placeholder="道号">
                <input type="password" class="login-input" id="loginPassword" placeholder="密码">
                <button class="btn-login" onclick="handleLogin()">进入灵界</button>
            </div>

            <div id="registerForm" style="display: none;">
                <input type="text" class="login-input" id="regName" placeholder="道号 (2-8字)">
                <input type="password" class="login-input" id="regPassword" placeholder="密码 (至少6位)">
                <select class="login-select" id="regRoot">
                    <option value="">-- 选择灵根 --</option>
                    <option value="金">金灵根 - 攻击+10%</option>
                    <option value="木">木灵根 - 修炼+15%</option>
                    <option value="水">水灵根 - 灵力+20%</option>
                    <option value="火">火灵根 - 攻击+15%</option>
                    <option value="土">土灵根 - 防御+15%</option>
                    <option value="风">风灵根 - 速度+20%</option>
                    <option value="雷">雷灵根 - 暴击+25%</option>
                    <option value="混沌天">混沌天灵根 - 全属性+50%</option>
                </select>
                <button class="btn-login" onclick="handleRegister()">踏入仙途</button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div class="game-wrapper" id="gameWrapper">
        <header class="game-header">
            <div class="header-left">
                <button class="header-btn" onclick="togglePlayerPanel()">角色</button>
                <span class="header-logo">灵界</span>
                <span class="header-realm" id="headerRealm">锻体期一重</span>
                <span class="header-time" id="headerTime"></span>
            </div>
            <div class="header-right">
                <span id="headerPlayerName">--</span>
                <button class="header-btn" onclick="togglePanel('skills')">功法</button>
                <button class="header-btn" onclick="togglePanel('equipment')">装备</button>
                <button class="header-btn" onclick="togglePanel('pets')">灵兽</button>
                <button class="header-btn" onclick="togglePanel('quests')">任务</button>
                <button class="header-btn" onclick="togglePanel('achievements')">成就</button>
                <button class="header-btn" onclick="togglePanel('map')">地图</button>
                <button class="header-btn" onclick="togglePanel('inventory')">储物</button>
                <button class="header-btn" onclick="togglePanel('guide')">说明</button>
                <button class="header-btn btn-logout" onclick="handleLogout()">退出</button>
            </div>
        </header>

        <div class="game-body">
            <aside class="player-panel" id="playerPanel">
                <div class="panel-section">
                    <h3 class="panel-title">角色信息</h3>
                    <div class="stat-row"><span class="stat-label">道号</span><span class="stat-value" id="statName">--</span></div>
                    <div class="stat-row"><span class="stat-label">境界</span><span class="stat-value" id="statRealm">--</span></div>
                    <div class="stat-row"><span class="stat-label">灵根</span><span class="stat-value text-rainbow" id="statRoot">--</span></div>
                    <div class="stat-row"><span class="stat-label">修为</span><span class="stat-value" id="statCultivation">--</span></div>
                    <div class="progress-container">
                        <div class="progress-bar" id="cultivationProgress" style="width: 0%"></div>
                        <span class="progress-text" id="cultivationProgressText">0%</span>
                    </div>
                    <div id="breakthroughArea" style="margin-top: 6px;"></div>
                </div>

                <div class="panel-section">
                    <h3 class="panel-title">战斗属性</h3>
                    <div class="stat-row"><span class="stat-label">生命</span><span class="stat-value hp" id="statHp">--</span></div>
                    <div class="stat-row"><span class="stat-label">灵力</span><span class="stat-value mp" id="statMp">--</span></div>
                    <div class="stat-row"><span class="stat-label">攻击</span><span class="stat-value atk" id="statAtk">--</span></div>
                    <div class="stat-row"><span class="stat-label">防御</span><span class="stat-value def" id="statDef">--</span></div>
                    <div class="stat-row"><span class="stat-label">速度</span><span class="stat-value" id="statSpd">--</span></div>
                    <div class="stat-row"><span class="stat-label">暴击</span><span class="stat-value" id="statCrit">--</span></div>
                    <div class="stat-row"><span class="stat-label">神识</span><span class="stat-value spirit" id="statSpirit">--</span></div>
                </div>

                <div class="panel-section">
                    <h3 class="panel-title">资源</h3>
                    <div class="stat-row"><span class="stat-label">灵石</span><span class="stat-value gold" id="statGold">0</span></div>
                    <div class="stat-row"><span class="stat-label">位置</span><span class="stat-value" id="statArea">--</span></div>
                    <div class="stat-row"><span class="stat-label">击杀</span><span class="stat-value" id="statKills">0</span></div>
                    <div class="stat-row"><span class="stat-label">战力</span><span class="stat-value" id="statPower">0</span></div>
                    <div class="stat-row"><span class="stat-label">机缘</span><span class="stat-value" id="statLuck">0%</span></div>
                </div>
            </aside>

            <main class="main-panel">
                <div class="log-area" id="logArea">
                    <div class="log-content" id="logContent">
                        <p class="log-welcome">欢迎来到灵界，修仙之路由此开始...</p>
                    </div>
                </div>

                <div class="action-bar" id="actionBar">
                    <button class="btn-action primary" id="meditateBtn" onclick="handleMeditate()">🧘 冥想修炼</button>
                    <button class="btn-action" id="exploreBtn" onclick="handleExplore()">🗺️ 探索(-1神识)</button>
                    <button class="btn-action rainbow" id="adventureBtn" onclick="triggerAdventure()">✨ 机缘事件</button>
                    <button class="btn-action" onclick="togglePanel('skills')">📚 功法</button>
                    <button class="btn-action" onclick="togglePanel('equipment')">⚔️ 装备</button>
                    <button class="btn-action" onclick="togglePanel('inventory')">🎒 储物</button>
                </div>

                <div class="action-bar" id="meditationBar" style="display: none;">

        function formatNumber(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return Math.floor(n).toString();
        }

        function getTimestamp() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}]`;
        }

        function addLog(msg, type = 'event') {
            const log = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="log-time">${getTimestamp()}</span>${msg}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
            while (log.children.length > 200) log.removeChild(log.firstChild);
        }

        // ==================== 属性计算 ====================
        function getRealmIdx(p) { return p.realmIdx || 0; }
        function getStageIdx(p) { return p.stageIdx || 0; }

        function getRealmName(p) {
            const ri = getRealmIdx(p);
            const si = getStageIdx(p);
            if (ri >= REALMS.length) return '真仙';
            return `${REALMS[ri].name}${REALMS[ri].stages[Math.min(si, REALMS[ri].stages.length - 1)]}`;
        }

        function getCultivationRequired(p) {
            const ri = getRealmIdx(p);
            const si = getStageIdx(p);
            if (ri >= REALMS.length - 1) return Infinity;
            const baseExp = [100, 500, 2000, 8000, 30000, 100000, 400000, 1500000, 5000000, 20000000];
            const base = baseExp[Math.min(ri, baseExp.length - 1)];
            return Math.floor(base * (1 + si * 0.5));
        }

        function getRootBonus(p) { return ROOT_BONUSES[p.root] || ROOT_BONUSES['金']; }

        function getSkillBonus(p, effect) {
            let bonus = 0;
            (p.skills || []).forEach((s, i) => {
                const skill = SKILLS[i];
                if (skill && skill.effect === effect && s.level > 0) {
                    bonus += skill.bonus * s.level;
                }
            });
            return bonus;
        }

        function getMaxHp(p) {
            const realm = REALMS[Math.min(getRealmIdx(p), REALMS.length - 1)];
            const root = getRootBonus(p);
            const base = realm.hpBase * (1 + getStageIdx(p) * 0.3);
            const skillBonus = getSkillBonus(p, 'hp');
            return Math.floor(base * (1 + root.hp) * (1 + skillBonus));
        }

        function getMaxMp(p) {
            const base = 50 + getRealmIdx(p) * 50;
            const root = getRootBonus(p);
            return Math.floor(base * (1 + getStageIdx(p) * 0.2) * (1 + root.mp));
        }

        function getAtk(p) {
            const realm = REALMS[Math.min(getRealmIdx(p), REALMS.length - 1)];
            const root = getRootBonus(p);
            const base = realm.atkBase * (1 + getStageIdx(p) * 0.2);
            const skillBonus = getSkillBonus(p, 'atk');
            const equipBonus = getEquipBonus(p, 'atk');
            return Math.floor(base * (1 + root.atk) * (1 + skillBonus) + equipBonus);
        }

        function getDef(p) {
            const realm = REALMS[Math.min(getRealmIdx(p), REALMS.length - 1)];
            const root = getRootBonus(p);
            const base = realm.defBase * (1 + getStageIdx(p) * 0.2);
            const skillBonus = getSkillBonus(p, 'def');
            const equipBonus = getEquipBonus(p, 'def');
            return Math.floor(base * (1 + root.def) * (1 + skillBonus) + equipBonus);
        }

        function getSpd(p) {
            const base = 10 + getRealmIdx(p) * 2;
            const root = getRootBonus(p);
            const skillBonus = getSkillBonus(p, 'spd');
            return Math.floor(base * (1 + root.spd) * (1 + skillBonus));
        }

        function getCrit(p) {
            const root = getRootBonus(p);
            const skillBonus = getSkillBonus(p, 'crit');
            return Math.min(0.8, 0.05 + root.crit + skillBonus);
        }

        function getLuck(p) {
            const root = getRootBonus(p);
            const skillBonus = getSkillBonus(p, 'luck');
            return Math.min(1.0, 0.1 + root.luck + skillBonus + (p.bonusLuck || 0));
        }

        function getMaxSpirit(p) { return 10 + getRealmIdx(p) * 5; }

        function getCultivationRate(p) {
            const root = getRootBonus(p);
            const skillBonus = getSkillBonus(p, 'cultivation');
            return (1 + getRealmIdx(p) * 0.5) * (1 + root.cultivation) * (1 + skillBonus);
        }

        function getEquipBonus(p, stat) {
            let bonus = 0;
            (p.equipment || {}).weapon && (bonus += EQUIPMENT_DATA[p.equipment.weapon]?.[stat] || 0);
            (p.equipment || {}).armor && (bonus += EQUIPMENT_DATA[p.equipment.armor]?.[stat] || 0);
            (p.equipment || {}).accessory && (bonus += EQUIPMENT_DATA[p.equipment.accessory]?.[stat] || 0);
            return bonus;
        }

        function getPower(p) {
            return Math.floor(getAtk(p) * 2 + getDef(p) * 1.5 + getMaxHp(p) / 5 + getSpd(p) * 10);
        }

        // ==================== UI更新 ====================
        function updateUI() {
            if (!gameState || !gameState.player) return;
            const p = gameState.player;

            document.getElementById('headerPlayerName').textContent = p.name;
            document.getElementById('headerRealm').textContent = getRealmName(p);
            document.getElementById('headerTime').textContent = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});

            document.getElementById('statName').textContent = p.name;
            document.getElementById('statRealm').textContent = getRealmName(p);
            
            const root = getRootBonus(p);
            const rootEl = document.getElementById('statRoot');
            rootEl.textContent = root.name;
            rootEl.className = p.root === '混沌天' ? 'stat-value text-rainbow' : 'stat-value';

            document.getElementById('statCultivation').textContent = `${formatNumber(p.cultivation)} / ${formatNumber(getCultivationRequired(p))}`;
            const progress = Math.min(100, (p.cultivation / getCultivationRequired(p)) * 100);
            document.getElementById('cultivationProgress').style.width = progress + '%';
            document.getElementById('cultivationProgressText').textContent = progress.toFixed(1) + '%';

            document.getElementById('statHp').textContent = `${Math.floor(p.hp)} / ${getMaxHp(p)}`;
            document.getElementById('statMp').textContent = `${Math.floor(p.mp)} / ${getMaxMp(p)}`;
            document.getElementById('statAtk').textContent = getAtk(p);
            document.getElementById('statDef').textContent = getDef(p);
            document.getElementById('statSpd').textContent = getSpd(p);
            document.getElementById('statCrit').textContent = (getCrit(p) * 100).toFixed(0) + '%';
            document.getElementById('statSpirit').textContent = `${Math.floor(p.spirit)} / ${getMaxSpirit(p)}`;
            document.getElementById('statGold').textContent = formatNumber(p.gold);
            document.getElementById('statArea').textContent = p.currentArea;
            document.getElementById('statKills').textContent = p.kills || 0;
            document.getElementById('statPower').textContent = formatNumber(getPower(p));
            document.getElementById('statLuck').textContent = (getLuck(p) * 100).toFixed(0) + '%';

            // 突破按钮
            const btArea = document.getElementById('breakthroughArea');
            if (p.cultivation >= getCultivationRequired(p)) {
                const ri = getRealmIdx(p);
                if (ri >= 9 && ri < 10) {
                    btArea.innerHTML = `<button class="btn-action rainbow" style="width:100%;padding:5px;font-size:10px;" onclick="startTribulation()">⚡ 渡劫飞升</button>`;
                } else {
                    btArea.innerHTML = `<button class="btn-action primary" style="width:100%;padding:5px;font-size:10px;" onclick="handleBreakthrough()">⚡ 尝试突破</button>`;
                }
            } else {
                btArea.innerHTML = '';
            }

            checkAchievements();
        }

        setInterval(() => {
            if (gameState) document.getElementById('headerTime').textContent = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
        }, 1000);

        // ==================== 登录系统 ====================
        function switchLoginTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        }

        function handleLogin() {
            const name = document.getElementById('loginName').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            if (!name || !pwd) { alert('请输入道号和密码'); return; }
            const saved = loadGame();
            if (saved && saved.player && saved.player.name === name) {
                gameState = saved;
                startGame();
            } else {
                alert('角色不存在');
            }
        }

        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const pwd = document.getElementById('regPassword').value;
            const root = document.getElementById('regRoot').value;
            if (name.length < 2 || name.length > 8) { alert('道号需要2-8个字'); return; }
            if (pwd.length < 6) { alert('密码至少6位'); return; }
            if (!root) { alert('请选择灵根'); return; }

            const isChaosRoot = root === '混沌天';
            
            gameState = {
                player: {
                    name, root, password: pwd,
                    realmIdx: 0, stageIndex: 0,
                    cultivation: isChaosRoot ? 10000 : 0,
                    hp: 100, mp: 50, spirit: 10,
                    gold: isChaosRoot ? 1000 : 100,
                    kills: 0,
                    currentArea: '灵溪村',
                    inventory: isChaosRoot ? [
                        { name: '灵芝', count: 10 },
                        { name: '精金矿', count: 10 },
                        { name: '中阶妖核', count: 5 },
                        { name: '天机丹', count: 3 },
                        { name: '九转金丹', count: 1 },
                        { name: '突破丹', count: 5 }
                    ] : [
                        { name: '灵草', count: 5 },
                        { name: '回气丹', count: 3 }
                    ],
                    skills: SKILLS.map(s => ({ level: s.id === 1 ? 1 : 0 })),
                    equipment: {},
                    pets: [],
                    quests: JSON.parse(JSON.stringify(QUESTS)),
                    achievements: JSON.parse(JSON.stringify(ACHIEVEMENTS)),
                    adventureCount: 0,
                    bonusLuck: 0
                }
            };

            saveGame();
            startGame();
            addLog(`🎉 ${name}踏入仙途，${getRealmBonus(p.root).name}觉醒！`, 'level');
        }

        function handleLogout() {
            saveGame();
            gameState = null;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('gameWrapper').classList.remove('active');
        }

        function startGame() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('gameWrapper').classList.add('active');
            updateUI();
        }

        // ==================== 游戏功能 ====================
        function handleMeditate() {
            if (gameState.player.hp <= 0) { addLog('❌ 你已重伤！', 'error'); return; }
            document.getElementById('actionBar').style.display = 'none';
            document.getElementById('meditationBar').style.display = 'flex';
            meditationStartTime = Date.now();
            meditationInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - meditationStartTime) / 1000);
                document.getElementById('meditationTime').textContent = elapsed + '秒';
                document.getElementById('meditationCultivation').textContent = formatNumber(Math.floor(elapsed * getCultivationRate(gameState.player)));
            }, 1000);
        }

        function handleStopMeditate() {
            if (!meditationInterval) return;
            clearInterval(meditationInterval);
            meditationInterval = null;

            const elapsed = (Date.now() - meditationStartTime) / 1000;
            const cultivation = Math.floor(elapsed * getCultivationRate(gameState.player));

            gameState.player.cultivation += cultivation;
            gameState.player.hp = Math.min(getMaxHp(gameState.player), gameState.player.hp + Math.floor(getMaxHp(gameState.player) * elapsed / 480));
            gameState.player.mp = Math.min(getMaxMp(gameState.player), gameState.player.mp + Math.floor(getMaxMp(gameState.player) * elapsed / 300));
            gameState.player.spirit = Math.min(getMaxSpirit(gameState.player), gameState.player.spirit + Math.floor(getMaxSpirit(gameState.player) * elapsed / 300));

            // 更新任务进度
            const quest = gameState.player.quests.find(q => q.id === 'daily_meditate');
            if (quest) {
                quest.progress = Math.min(quest.target, quest.progress + elapsed);
                if (quest.progress >= quest.target) completeQuest(quest);
            }

            addLog(`🧘 修炼${Math.floor(elapsed)}秒，获得 <span style="color:var(--text-purple)">${formatNumber(cultivation)}</span> 修为`, 'event');

            document.getElementById('actionBar').style.display = 'flex';
            document.getElementById('meditationBar').style.display = 'none';

            updateUI();
            saveGame();
        }

        function handleExplore() {
            if (gameState.player.spirit < 1) { addLog('❌ 神识不足！', 'error'); return; }
            if (gameState.player.hp <= 0) { addLog('❌ 你已重伤！', 'error'); return; }

            gameState.player.spirit -= 1;
            const roll = Math.random();

            // 机缘加成影响探索结果
            const luck = getLuck(gameState.player);

            if (roll < 0.35 - luck * 0.1) {
                startCombat();
            } else if (roll < 0.55) {
                const mats = getRealmIdx(gameState.player) < 3 ? ['灵草', '灵矿石', '低阶妖核'] : ['灵芝', '精金矿', '中阶妖核'];
                const item = mats[Math.floor(Math.random() * mats.length)];
                const count = Math.floor(Math.random() * 3) + 1 + Math.floor(luck * 2);
                addItem(item, count);
                addLog(`🌿 发现 <span style="color:var(--text-green)">${item} x${count}</span>`, 'loot');
            } else if (roll < 0.75) {
                const cultivation = Math.floor(Math.random() * 150 + 50) * (getRealmIdx(gameState.player) + 1) * (1 + luck);
                gameState.player.cultivation += cultivation;
                addLog(`💫 悟道心得，获得 <span style="color:var(--text-purple)">${formatNumber(cultivation)}</span> 修为`, 'event');
            } else if (roll < 0.9) {
                const gold = Math.floor(Math.random() * 100 + 20) * (getRealmIdx(gameState.player) + 1) * (1 + luck);
                gameState.player.gold += Math.floor(gold);
                addLog(`💰 发现灵石 <span style="color:var(--text-gold)">${formatNumber(Math.floor(gold))}</span>`, 'loot');
            } else {
                // 稀有事件
                if (Math.random() < luck) {
                    triggerAdventure();
                } else {
                    addLog(`🍃 平安无事...`, 'event');
                }
            }

            // 更新任务进度
            const quest = gameState.player.quests.find(q => q.id === 'daily_explore');
            if (quest) {
                quest.progress++;
                if (quest.progress >= quest.target) completeQuest(quest);
            }

            updateUI();
            saveGame();
        }

        function handleBreakthrough() {
            const p = gameState.player;
            if (p.cultivation < getCultivationRequired(p)) { addLog('❌ 修为不足！', 'error'); return; }

            let baseRate = [1.0, 0.9, 0.8, 0.7, 0.6, 0.5, 0.4, 0.3, 0.25, 0.2][Math.min(getRealmIdx(p), 9)];
            const stageCount = REALMS[getRealmIdx(p)].stages.length;
            baseRate -= (stageCount > 4 ? getStageIdx(p) * 0.06 : getStageIdx(p) * 0.1);
            baseRate = Math.max(0.08, baseRate);

            const overflow = (p.cultivation - getCultivationRequired(p)) / getCultivationRequired(p);
            baseRate += overflow * 0.3;

            // 混沌天灵根额外加成
            if (p.root === '混沌天') baseRate += 0.2;

            baseRate = Math.min(0.98, baseRate);
            const success = Math.random() < baseRate;

            if (success) {
                p.cultivation -= getCultivationRequired(p);
                p.stageIndex++;
                if (p.stageIndex >= REALMS[getRealmIdx(p)].stages.length) {
                    p.realmIndex++;
                    p.stageIndex = 0;
                    if (p.realmIndex >= REALMS.length) p.realmIndex = REALMS.length - 1;
                }
                p.hp = getMaxHp(p);
                p.mp = getMaxMp(p);
                p.spirit = getMaxSpirit(p);
                addLog(`⚡ 突破成功！<span style="color:var(--text-gold)">${getRealmName(p)}</span> (${(baseRate * 100).toFixed(0)}%率)`, 'level');

                // 检查主线任务
                checkMainQuests();
            } else {
                p.cultivation = Math.floor(p.cultivation * 0.75);
                addLog(`💔 突破失败，损失25%修为`, 'error');
            }

            updateUI();
            saveGame();
        }

        // ==================== 战斗系统 ====================
        function startCombat() {
            const p = gameState.player;
            const ri = Math.min(getRealmIdx(p), REALMS.length - 1);
            const si = getStageIdx(p);
            const realm = REALMS[ri];
            const monster = MONSTERS[Math.floor(Math.random() * MONSTERS.length)];

            const monsterHp = Math.floor(realm.hpBase * monster.hpMult * (1 + si * 0.25) * 1.3);
            const monsterAtk = Math.floor(realm.atkBase * monster.atkMult * (1 + si * 0.2) * 1.2);
            const monsterDef = Math.floor(realm.defBase * monster.defMult * (1 + si * 0.2) * 1.1);

            gameState.currentCombat = {
                monster: {
                    name: monster.name,
                    realm: getRealmName({ realmIndex: ri, stageIndex: si }),
                    hp: monsterHp, maxHp: monsterHp,
                    atk: monsterAtk, def: monsterDef
                }
            };

            const html = `
                <div style="text-align:center;margin-bottom:15px;">
                    <div style="font-size:18px;color:var(--text-orange);font-weight:600;">${monster.name}</div>
                    <div style="font-size:12px;color:var(--text-muted);">${getRealmName({ realmIndex: ri, stageIndex: si })}</div>
                </div>
                <div style="display:flex;justify-content:center;gap:30px;margin-bottom:15px;">
                    <div style="text-align:center;"><div style="font-size:20px;color:var(--text-red);">${monsterHp}</div><div style="font-size:10px;color:var(--text-muted);">生命</div></div>
                    <div style="text-align:center;"><div style="font-size:20px;color:var(--text-orange);">${monsterAtk}</div><div style="font-size:10px;color:var(--text-muted);">攻击</div></div>
                    <div style="text-align:center;"><div style="font-size:20px;color:var(--text-cyan);">${monsterDef}</div><div style="font-size:10px;color:var(--text-muted);">防御</div></div>
                </div>
                <div id="combatLog" style="max-height:120px;overflow-y:auto;background:var(--bg-input);border-radius:6px;padding:8px;font-size:11px;"></div>
            `;

            document.getElementById('encounterTitle').textContent = '⚔️ 遭遇妖兽';
            document.getElementById('encounterContent').innerHTML = html;
            document.getElementById('encounterActions').innerHTML = `
                <button class="btn-action primary" onclick="doCombatRound('attack')">⚔️ 攻击</button>
                <button class="btn-action" onclick="doCombatRound('skill')">🔥 技能</button>
                <button class="btn-action danger" onclick="tryFlee()">🏃 逃跑</button>
            `;
            document.getElementById('encounterModal').classList.add('active');
        }

        function doCombatRound(action) {
            const combat = gameState.currentCombat;
            const p = gameState.player;
            const m = combat.monster;
            const log = document.getElementById('combatLog');

            if (action === 'attack') {
                let dmg = Math.max(1, getAtk(p) - m.def + Math.floor(Math.random() * 15));
                let isCrit = Math.random() < getCrit(p);
                if (isCrit) {
                    dmg = Math.floor(dmg * 2);
                    log.innerHTML += `<div style="color:var(--text-gold);">💥 暴击！造成 ${dmg} 伤害</div>`;
                } else {
                    log.innerHTML += `<div style="color:var(--text-cyan);">你攻击${m.name}，造成 ${dmg} 伤害</div>`;
                }
                m.hp -= dmg;
            } else if (action === 'skill') {
                let dmg = Math.floor(getAtk(p) * 1.8 - m.def + Math.floor(Math.random() * 20));
                log.innerHTML += `<div style="color:var(--text-purple);">🔥 释放技能，造成 ${dmg} 伤害</div>`;
                m.hp -= dmg;
                p.mp -= 20;
            }

            log.scrollTop = log.scrollHeight;

            if (m.hp <= 0) {
                combatVictory();
                return;
            }

            // 怪物反击
            const monsterDmg = Math.max(1, m.atk - getDef(p) + Math.floor(Math.random() * 10));
            p.hp -= monsterDmg;
            log.innerHTML += `<div style="color:var(--text-red);">${m.name}反击，造成 ${monsterDmg} 伤害</div>`;

            if (p.hp <= 0) {
                p.hp = 0;
                log.innerHTML += `<div style="color:var(--text-red);font-weight:600;">💀 你被击败了...</div>`;
                setTimeout(() => {
                    document.getElementById('encounterModal').classList.remove('active');
                    addLog(`💀 被${m.name}击败...`, 'error');
                    updateUI();
                    saveGame();
                }, 1500);
            }
        }

        function tryFlee() {
            const fleeRate = Math.min(0.8, 0.5 + getSpd(gameState.player) * 0.01);
            if (Math.random() < fleeRate) {
                document.getElementById('encounterModal').classList.remove('active');
                addLog(`🏃 成功逃跑！`, 'event');
            } else {
                addLog(`❌ 逃跑失败！`, 'error');
                doCombatRound('wait');
            }
        }

        function combatVictory() {
            const p = gameState.player;
            const m = gameState.currentCombat.monster;

            const goldReward = Math.floor(Math.random() * 100 + 50) * (getRealmIdx(p) + 1);
            const expReward = Math.floor(Math.random() * 200 + 100) * (getRealmIdx(p) + 1);
            p.gold += goldReward;
            p.cultivation += expReward;
            p.kills = (p.kills || 0) + 1;

            // 更新任务
            const quest = p.quests.find(q => q.id === 'daily_kill');
            if (quest) {
                quest.progress++;
                if (quest.progress >= quest.target) completeQuest(quest);
            }

            // 掉落
            const drops = getRealmIdx(p) < 3 ? ['低阶妖核', '灵草', '灵矿石'] : ['中阶妖核', '灵芝', '精金矿'];
            if (Math.random() < 0.4 + getLuck(p)) {
                const drop = drops[Math.floor(Math.random() * drops.length)];
                addItem(drop, 1);
                addLog(`⚔️ 击败${m.name}！+${goldReward}灵石 +${expReward}修为 📦${drop}`, 'combat');
            } else {
                addLog(`⚔️ 击败${m.name}！+${goldReward}灵石 +${expReward}修为`, 'combat');
            }

            // 检查成就
            checkAchievement('first_kill');
            if (p.kills >= 100) checkAchievement('kill_100');
            if (p.kills >= 1000) checkAchievement('kill_1000');

            document.getElementById('encounterModal').classList.remove('active');
            updateUI();
            saveGame();
        }

        // ==================== 机缘系统 ====================
        function triggerAdventure() {
            const adv = ADVENTURES[Math.floor(Math.random() * ADVENTURES.length)];
            gameState.currentAdventure = adv;

            let choicesHtml = adv.choices.map((c, i) => `
                <button class="btn-action" style="width:100%;justify-content:center;" onclick="chooseAdventure(${i})">${c.text}</button>
            `).join('');

            document.getElementById('adventureContent').innerHTML = `
                <div class="adventure-card">
                    <div class="adventure-title">${adv.title}</div>
                    <p style="font-size:12px;color:var(--text-secondary);margin:10px 0;">${adv.desc}</p>
                    <div class="adventure-choices">${choicesHtml}</div>
                </div>
            `;
            document.getElementById('adventureModal').classList.add('active');
        }

        function chooseAdventure(idx) {
            const adv = gameState.currentAdventure;
            const choice = adv.choices[idx];
            const luck = getLuck(gameState.player);
            const successRate = Math.min(0.95, choice.success + luck * 0.2);

            const success = Math.random() < successRate;

            if (success) {
                const reward = choice.successReward;
                if (reward.cultivation) {
                    gameState.player.cultivation += reward.cultivation;
                }
                if (reward.gold) {
                    gameState.player.gold += reward.gold;
                }
                if (reward.item) {
                    addItem(reward.item, 1);
                }
                if (reward.pet) {
                    const pet = PETS.find(p => p.name.includes(reward.pet)) || PETS[0];
                    gameState.player.pets.push({ ...pet, level: 1 });
                    checkAchievement('collector');
                }
                if (reward.luck) {
                    gameState.player.bonusLuck = (gameState.player.bonusLuck || 0) + reward.luck;
                }
                addLog(`✨ 机缘成功！${adv.title} - ${JSON.stringify(reward)}`, 'adventure');
            } else {
                const penalty = choice.failPenalty;
                if (penalty.hp) gameState.player.hp = Math.max(0, gameState.player.hp - penalty.hp);
                if (penalty.cultivation) gameState.player.cultivation = Math.max(0, gameState.player.cultivation + penalty.cultivation);
                addLog(`💔 机缘失败...${penalty.hp ? ` 损失${penalty.hp}生命` : ''}`, 'error');
            }

            gameState.player.adventureCount = (gameState.player.adventureCount || 0) + 1;
            if (gameState.player.adventureCount >= 10) checkAchievement('luck_master');

            document.getElementById('adventureModal').classList.remove('active');
            updateUI();
            saveGame();
        }

        // ==================== 渡劫系统 ====================
        function startTribulation() {
            const p = gameState.player;
            if (getRealmIdx(p) < 9) {
                addLog('❌ 只有渡劫期才能渡劫！', 'error');
                return;
            }

            document.getElementById('tribulationContent').innerHTML = `
                <div class="tribulation-card">
                    <p style="margin-bottom:15px;">九重天劫即将降临，每劫持续30秒</p>
                    <div class="tribulation-phase" id="tribPhase">🌩️ 第一劫雷</div>
                    <div class="tribulation-progress"><div id="tribProgress" style="width:100%;height:100%;background:var(--gradient-purple);transition:width 1s;"></div></div>
                    <p style="margin-top:10px;font-size:11px;">劫雷伤害: <span id="tribDmg">1000</span></p>
                    <button class="btn-action rainbow" style="width:100%;margin-top:15px;" onclick="processTribulation()">⚡ 开始渡劫</button>
                </div>
            `;
            document.getElementById('tribulationModal').classList.add('active');
        }

        function processTribulation() {
            const p = gameState.player;
            let tribNum = 1;
            let survived = true;

            const interval = setInterval(() => {
                if (tribNum > 9) {
                    clearInterval(interval);
                    tribulationSuccess();
                    return;
                }

                const dmg = Math.floor(500 + Math.random() * 500 + getRealmIdx(p) * 200);
                p.hp -= dmg;
                document.getElementById('tribPhase').textContent = `🌩️ 第${['一','二','三','四','五','六','七','八','九'][tribNum-1]}劫雷`;
                document.getElementById('tribDmg').textContent = dmg;
                document.getElementById('tribProgress').style.width = ((9 - tribNum) / 9 * 100) + '%';

                if (p.hp <= 0) {
                    clearInterval(interval);
                    tribulationFail();
                    return;
                }

                tribNum++;
            }, 2000);
        }

        function tribulationSuccess() {
            const p = gameState.player;
            p.realmIndex = 10;
            p.stageIndex = 0;
            p.hp = getMaxHp(p);
            p.mp = getMaxMp(p);
            p.spirit = getMaxSpirit(p);
            addLog(`🏆 渡劫成功！飞升真仙！`, 'level');
            checkAchievement('ascender');
            document.getElementById('tribulationModal').classList.remove('active');
            updateUI();
            saveGame();
        }

        function tribulationFail() {
            const p = gameState.player;
            p.hp = 1;
            p.cultivation = Math.floor(p.cultivation * 0.5);
            addLog(`💀 渡劫失败...修为减半`, 'error');
            document.getElementById('tribulationModal').classList.remove('active');
            updateUI();
            saveGame();
        }

        // ==================== 物品系统 ====================
        function addItem(name, count) {
            const inv = gameState.player.inventory;
            const existing = inv.find(i => i.name === name);
            if (existing) existing.count += count;
            else inv.push({ name, count });
        }

        function hasItem(name, count = 1) {
            const item = gameState.player.inventory.find(i => i.name === name);
            return item && item.count >= count;
        }

        function removeItem(name, count = 1) {
            const idx = gameState.player.inventory.findIndex(i => i.name === name);
            if (idx === -1) return false;
            gameState.player.inventory[idx].count -= count;
            if (gameState.player.inventory[idx].count <= 0) gameState.player.inventory.splice(idx, 1);
            return true;
        }

        function useItem(idx) {
            const item = gameState.player.inventory[idx];
            if (!item || item.count <= 0) return;
            const data = ITEMS[item.name];
            if (!data || data.type !== 'pill') { addLog('❌ 无法使用', 'error'); return; }

            const e = data.effect;
            if (e.hp) gameState.player.hp = Math.min(getMaxHp(gameState.player), gameState.player.hp + e.hp);
            if (e.mp) gameState.player.mp = Math.min(getMaxMp(gameState.player), gameState.player.mp + e.mp);
            if (e.cultivation) gameState.player.cultivation += e.cultivation;
            if (e.breakthrough) gameState.player.breakthroughBonus = (gameState.player.breakthroughBonus || 0) + e.breakthrough;

            addLog(`💊 使用${item.name}`, 'event');
            item.count--;
            if (item.count <= 0) gameState.player.inventory.splice(idx, 1);
            updateUI();
            saveGame();
            renderInventory();
        }

        // ==================== 功法系统 ====================
        function upgradeSkill(idx) {
            const skill = SKILLS[idx];
            const p = gameState.player;
            const currentLevel = p.skills[idx]?.level || 0;
            const cost = skill.cost * (currentLevel + 1);

            if (currentLevel >= skill.maxLevel) { addLog('❌ 已满级', 'error'); return; }
            if (p.gold < cost) { addLog(`❌ 灵石不足，需要${cost}`, 'error'); return; }

            p.gold -= cost;
            p.skills[idx].level++;
            addLog(`📚 ${skill.name}升至Lv.${p.skills[idx].level}`, 'level');
            updateUI();
            saveGame();
            renderSkills();
        }

        // ==================== 任务系统 ====================
        function completeQuest(quest) {
            const r = quest.reward;
            if (r.gold) gameState.player.gold += r.gold;
            if (r.cultivation) gameState.player.cultivation += r.cultivation;
            if (r.item) addItem(r.item, 1);
            if (r.skill) {
                const idx = SKILLS.findIndex(s => s.name === r.skill);
                if (idx >= 0) gameState.player.skills[idx].level = 1;
            }
            addLog(`📋 完成任务：${quest.name}`, 'level');
            quest.progress = 0; // 重置日常
            updateUI();
            saveGame();
        }

        function checkMainQuests() {
            const p = gameState.player;
            const ri = getRealmIdx(p);
            
            p.quests.forEach(q => {
                if (q.type === 'main' && ri >= q.target && q.progress < q.target) {
                    q.progress = ri;
                    completeQuest(q);
                }
            });
        }

        // ==================== 成就系统 ====================
        function checkAchievement(id) {
            const ach = gameState.player.achievements.find(a => a.id === id);
            if (ach && !ach.unlocked) {
                ach.unlocked = true;
                addLog(`🏅 成就解锁：${ach.name}`, 'level');
            }
        }

        function checkAchievements() {
            const p = gameState.player;
            const ri = getRealmIdx(p);
            if (ri >= 1) checkAchievement('realm_qi');
            if (ri >= 3) checkAchievement('realm_golden');
            if (ri >= 4) checkAchievement('realm_nascent');
            if (p.gold >= 10000) checkAchievement('gold_10000');
        }

        // ==================== 面板渲染 ====================
        function togglePlayerPanel() {
            document.getElementById('playerPanel').classList.toggle('mobile-active');
        }

        function togglePanel(name) {
            const sp = document.getElementById('sidePanel');
            if (sp.classList.contains('active') && document.getElementById('sidePanelTitle').textContent === getPanelTitle(name)) {
                closePanel();
                return;
            }
            document.getElementById('sidePanelTitle').textContent = getPanelTitle(name);
            sp.classList.add('active');
            renderPanel(name);
        }

        function getPanelTitle(n) {
            return { inventory: '储物袋', map: '九霄大陆', guide: '游戏说明', skills: '功法', equipment: '装备', pets: '灵兽', quests: '任务', achievements: '成就' }[n] || n;
        }

        function renderPanel(n) {
            const f = { inventory: renderInventory, map: renderMap, guide: renderGuide, skills: renderSkills, equipment: renderEquipment, pets: renderPets, quests: renderQuests, achievements: renderAchievements };
            if (f[n]) f[n]();
        }

        function renderInventory() {
            let html = '<div class="inventory-grid">';
            gameState.player.inventory.forEach((item, idx) => {
                const d = ITEMS[item.name] || { icon: '📦', type: 'misc' };
                html += `<div class="inventory-slot" onclick="useItem(${idx})" title="${d.desc || ''}"><span class="item-icon">${d.icon}</span><span style="font-size:9px">${item.name}</span><span class="item-count">x${item.count}</span></div>`;
            });
            if (!gameState.player.inventory.length) html += '<div class="inventory-slot empty">空</div>';
            html += '</div>';
            document.getElementById('sidePanelContent').innerHTML = html;
        }

        function renderMap() {
            let html = '<div>';
            Object.entries(AREAS).forEach(([region, areas]) => {
                html += `<div style="background:var(--bg-card);border-radius:6px;padding:8px;margin-bottom:8px;"><div style="font-size:12px;color:var(--text-gold);margin-bottom:6px;">${region}</div>`;
                areas.forEach(a => {
                    const isCurrent = gameState.player.currentArea === a.name;
                    html += `<div class="map-area ${isCurrent ? 'current' : ''}" onclick="travelTo('${a.name}')"><span>${a.name}</span><span style="font-size:10px;color:var(--text-muted)">${a.danger}</span></div>`;
                });
                html += '</div>';
            });
            html += '</div>';
            document.getElementById('sidePanelContent').innerHTML = html;
        }

        function renderGuide() {
            document.getElementById('sidePanelContent').innerHTML = `
<div style="font-size:11px;line-height:1.7;">
<h4 style="color:var(--text-gold);margin:10px 0 5px;">🎮 基础玩法</h4>
<p>• 🧘 冥想修炼：获得修为并恢复状态</p>
<p>• 🗺️ 探索：消耗神识触发随机事件</p>
<p>• ✨ 机缘：特殊事件，高风险高回报</p>

<h4 style="color:var(--text-gold);margin:15px 0 5px;">⚡ 境界体系</h4>
<p>锻体→练气→筑基→金丹→元婴→化神→炼虚→合道→大乘→渡劫→真仙</p>

<h4 style="color:var(--text-gold);margin:15px 0 5px;">🌟 灵根系统</h4>
<p>• 普通灵根：单一属性加成</p>
<p>• 混沌天灵根：全属性+50%，修炼+300%</p>

<h4 style="color:var(--text-gold);margin:15px 0 5px;">📚 功法与装备</h4>
<p>• 功法：提升各项属性</p>
<p>• 装备：武器、防具、饰品</p>

<h4 style="color:var(--text-gold);margin:15px 0 5px;">🐾 灵兽</h4>
<p>• 机缘事件可获得灵兽</p>
<p>• 灵兽提供战斗支援</p>
</div>`;
        }

        function renderSkills() {
            let html = '<div class="skill-grid">';
            SKILLS.forEach((s, i) => {
                const level = gameState.player.skills[i]?.level || 0;
                const cost = s.cost * (level + 1);
                const canUpgrade = level < s.maxLevel && gameState.player.gold >= cost;
                html += `<div class="skill-card">
<div class="skill-icon" style="opacity:${level > 0 ? 1 : 0.4}">${s.icon}</div>
<div class="skill-info"><div class="skill-name">${s.name}</div><div class="skill-desc">${s.desc}</div><div class="skill-level">Lv.${level}/${s.maxLevel}</div></div>
<button class="btn-action" style="padding:4px 8px;font-size:10px" ${canUpgrade ? '' : 'disabled'} onclick="upgradeSkill(${i})">升级 ${cost}💎</button>
</div>`;
            });
            html += '</div>';
            document.getElementById('sidePanelContent').innerHTML = html;
        }

        function renderEquipment() {
            let html = '<div>';
            ['weapon', 'armor', 'accessory'].forEach(slot => {
                const equipped = gameState.player.equipment?.[slot];
                const data = equipped ? EQUIPMENT_DATA[equipped] : null;
                html += `<div class="equip-slot ${equipped ? '' : 'empty'}">
<span>${slot === 'weapon' ? '⚔️' : slot === 'armor' ? '🛡️' : '💎'}</span>
<span class="equip-slot-name">${equipped || '未装备'}</span>
${data ? `<span class="equip-slot-stats">+${data.atk || data.def || data.hp || data.mp || 0}</span>` : ''}
</div>`;
            });
            html += '</div>';
            document.getElementById('sidePanelContent').innerHTML = html;
        }

        function renderPets() {
            const pets = gameState.player.pets || [];
            let html = '<div>';
            pets.forEach(p => {
                html += `<div class="pet-card">
<div class="pet-name">${p.icon} ${p.name}</div>
<div class="pet-level">Lv.${p.level || 1}</div>
<div class="pet-stats"><span>❤️ ${p.hp}</span><span>⚔️ ${p.atk}</span><span>🛡️ ${p.def}</span></div>
</div>`;
            });
            if (!pets.length) html += '<div style="text-align:center;color:var(--text-muted);padding:20px;">暂无灵兽，机缘事件可获得</div>';
            html += '</div>';
            document.getElementById('sidePanelContent').innerHTML = html;
        }

        function renderQuests() {
            let html = '<div>';
            gameState.player.quests.forEach(q => {
                const progress = Math.min(100, (q.progress / q.target) * 100);
                html += `<div class="quest-card">
<div class="quest-title">[${q.type === 'daily' ? '日常' : '主线'}] ${q.name}</div>
<div class="quest-desc">${q.desc}</div>
<div class="quest-progress">进度: ${q.progress}/${q.target} (${progress.toFixed(0)}%)</div>
<div class="quest-rewards">奖励: ${JSON.stringify(q.reward)}</div>
</div>`;
            });
            html += '</div>';
            document.getElementById('sidePanelContent').innerHTML = html;
        }

        function renderAchievements() {
            let html = '<div>';
            gameState.player.achievements.forEach(a => {
                html += `<div class="ach-card ${a.unlocked ? 'unlocked' : ''}">
<span class="ach-icon" style="opacity:${a.unlocked ? 1 : 0.3}">${a.icon}</span>
<div class="ach-info"><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>
</div>`;
            });
            html += '</div>';
            document.getElementById('sidePanelContent').innerHTML = html;
        }

        function travelTo(name) {
            gameState.player.currentArea = name;
            addLog(`🗺️ 前往 ${name}`, 'event');
            updateUI();
            saveGame();
            renderMap();
        }

        function closePanel() {
            document.getElementById('sidePanel').classList.remove('active');
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            const saved = loadGame();
            if (saved && saved.player) {
                gameState = saved;
                startGame();
            }
        });
    </script>
</body>
</html>
