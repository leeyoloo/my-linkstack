<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>灵界 LingVerse - 修仙世界</title>
    <style>
        :root {
            --bg-primary: #0a0f1c;
            --bg-secondary: #12172a;
            --bg-card: #1a2035;
            --bg-input: #0d1220;
            --text-primary: #e8e6e3;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --text-gold: #fbbf24;
            --text-orange: #f97316;
            --text-green: #22c55e;
            --text-red: #ef4444;
            --text-blue: #3b82f6;
            --text-purple: #a855f7;
            --text-cyan: #06b6d4;
            --border-color: #2d3748;
            --accent: #8b5cf6;
            --accent2: #06b6d4;
            --gradient-gold: linear-gradient(135deg, #fbbf24, #f59e0b);
            --gradient-purple: linear-gradient(135deg, #8b5cf6, #6366f1);
            --success-color: #22c55e;
        }

        .theme-light {
            --bg-primary: #f3f2f0;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f9fafb;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --border-color: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            z-index: 1000;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: var(--gradient-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle { color: var(--text-muted); margin-bottom: 32px; font-size: 14px; }

        .login-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        .login-input:focus { border-color: var(--accent); }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--gradient-purple);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .login-tabs { display: flex; gap: 8px; margin-bottom: 24px; }

        .login-tab {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .login-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Game Layout */
        .game-wrapper {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .game-wrapper.active { display: flex; }

        /* Header */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header-left, .header-right { display: flex; align-items: center; gap: 8px; }

        .header-logo {
            font-size: 18px;
            font-weight: 700;
            background: var(--gradient-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-realm {
            padding: 4px 10px;
            background: var(--bg-card);
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-gold);
        }

        .header-time {
            color: var(--text-muted);
            font-size: 12px;
        }

        .header-btn {
            padding: 5px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
        }

        .header-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .btn-logout { color: var(--text-red); }

        /* Game Body */
        .game-body { display: flex; flex: 1; overflow: hidden; }

        /* Player Panel */
        .player-panel {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 12px;
            overflow-y: auto;
            flex-shrink: 0;
            font-size: 12px;
        }

        .panel-section { margin-bottom: 16px; }

        .panel-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border-color);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }

        .stat-label { color: var(--text-muted); }
        .stat-value { font-weight: 500; }
        .stat-value.hp { color: var(--text-red); }
        .stat-value.mp { color: var(--text-blue); }
        .stat-value.atk { color: var(--text-orange); }
        .stat-value.def { color: var(--text-cyan); }
        .stat-value.spirit { color: var(--text-purple); }

        .progress-container {
            position: relative;
            height: 6px;
            background: var(--bg-input);
            border-radius: 3px;
            margin-top: 4px;
        }

        .progress-bar {
            height: 100%;
            background: var(--gradient-purple);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .progress-text {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--text-muted);
        }

        /* Main Panel */
        .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .log-area {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        .log-content { max-width: 900px; margin: 0 auto; }

        .log-entry {
            padding: 6px 10px;
            margin-bottom: 6px;
            background: var(--bg-card);
            border-radius: 6px;
            border-left: 3px solid var(--border-color);
            font-size: 13px;
            line-height: 1.5;
        }

        .log-entry.event { border-left-color: var(--text-cyan); }
        .log-entry.combat { border-left-color: var(--text-red); }
        .log-entry.loot { border-left-color: var(--text-gold); }
        .log-entry.level { border-left-color: var(--text-purple); }
        .log-entry.chat { border-left-color: var(--text-blue); }
        .log-entry.sect { border-left-color: var(--text-green); }
        .log-entry.error { border-left-color: var(--text-red); background: rgba(239,68,68,0.1); }

        .log-time { font-size: 11px; color: var(--text-muted); margin-right: 6px; }

        .log-welcome {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Action Bar */
        .action-bar {
            padding: 12px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-action {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-action:hover { border-color: var(--accent); }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-action.primary { background: var(--gradient-purple); border: none; color: white; }
        .btn-action.danger { border-color: var(--text-red); color: var(--text-red); }

        .meditation-bar {
            display: none;
            padding: 12px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        .meditation-bar.active { display: flex; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .meditating { animation: pulse 2s infinite; }

        /* Side Panel */
        .side-panel {
            width: 320px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
        }

        .side-panel.active { display: flex; }

        .side-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .side-panel-title { font-size: 14px; font-weight: 600; }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
        }

        .side-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        /* Panel Tabs */
        .panel-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .panel-tab {
            padding: 6px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
        }

        .panel-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Inventory */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 6px;
        }

        .inventory-slot {
            aspect-ratio: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 4px;
            font-size: 10px;
        }

        .inventory-slot:hover { border-color: var(--accent); }
        .inventory-slot.empty { color: var(--text-muted); }

        .item-icon { font-size: 20px; }
        .item-count { font-size: 10px; color: var(--text-muted); }

        /* Map */
        .map-region {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .map-region-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-gold);
            margin-bottom: 8px;
        }

        .map-area {
            padding: 6px 10px;
            margin: 4px 0;
            background: var(--bg-input);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .map-area:hover { background: var(--accent); color: white; }
        .map-area.current { border: 1px solid var(--accent); }
        .map-area-level { font-size: 10px; color: var(--text-muted); }

        /* Chat */
        .chat-messages {
            height: 200px;
            overflow-y: auto;
            background: var(--bg-input);
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 8px;
        }

        .chat-msg {
            margin-bottom: 6px;
            font-size: 12px;
        }

        .chat-msg-name { color: var(--text-gold); font-weight: 600; }
        .chat-msg-time { color: var(--text-muted); font-size: 10px; }
        .chat-msg-text { color: var(--text-primary); }

        .chat-input-bar {
            display: flex;
            gap: 6px;
        }

        .chat-input {
            flex: 1;
            padding: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
        }

        .btn-send {
            padding: 8px 16px;
            background: var(--accent);
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-red);
            text-align: center;
        }

        .monster-info { text-align: center; margin-bottom: 16px; }
        .monster-name { font-size: 16px; font-weight: 600; color: var(--text-orange); }
        .monster-realm { font-size: 12px; color: var(--text-muted); margin: 4px 0 12px; }
        .monster-stats { display: flex; justify-content: center; gap: 20px; }
        .monster-stat { text-align: center; }
        .monster-stat-value { font-size: 16px; font-weight: 600; }
        .monster-stat-label { font-size: 10px; color: var(--text-muted); }

        .combat-log {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 12px;
            background: var(--bg-input);
            border-radius: 6px;
            padding: 8px;
            font-size: 11px;
        }

        .modal-actions { display: flex; gap: 10px; justify-content: center; }

        /* Dungeon */
        .dungeon-list { display: flex; flex-direction: column; gap: 8px; }

        .dungeon-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
        }

        .dungeon-card:hover { border-color: var(--accent); }

        .dungeon-name { font-size: 14px; font-weight: 600; color: var(--text-gold); }
        .dungeon-level { font-size: 11px; color: var(--text-muted); }
        .dungeon-rewards { font-size: 11px; color: var(--text-cyan); margin-top: 4px; }

        /* Ranking */
        .ranking-list { display: flex; flex-direction: column; gap: 4px; }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--bg-input);
            border-radius: 4px;
        }

        .ranking-pos {
            width: 24px;
            height: 24px;
            background: var(--gradient-purple);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .ranking-pos.gold { background: var(--gradient-gold); color: #000; }
        .ranking-name { flex: 1; font-size: 12px; }
        .ranking-value { font-size: 12px; color: var(--text-gold); }

        /* Market */
        .market-listing {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: var(--bg-input);
            border-radius: 4px;
            margin-bottom: 6px;
        }

        .market-item-name { flex: 1; font-size: 12px; }
        .market-item-price { font-size: 12px; color: var(--text-gold); }

        .btn-buy {
            padding: 4px 12px;
            background: var(--success-color);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 11px;
            cursor: pointer;
        }

        /* Sect */
        .sect-info {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .sect-name { font-size: 16px; font-weight: 600; color: var(--text-gold); }
        .sect-level { font-size: 11px; color: var(--text-muted); }
        .sect-bonus { font-size: 11px; color: var(--text-green); margin-top: 4px; }

        /* Crafting */
        .crafting-recipe {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: var(--bg-input);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .craft-result { flex: 1; }
        .craft-materials { font-size: 11px; color: var(--text-muted); }

        .btn-craft {
            padding: 6px 12px;
            background: var(--accent);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 11px;
            cursor: pointer;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

        /* Mobile */
        @media (max-width: 900px) {
            .player-panel { display: none; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; width: 280px; }
            .player-panel.mobile-active { display: block; }
            .side-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 100%; z-index: 100; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1 class="login-title">灵界</h1>
            <p class="login-subtitle">修仙之路，由此开始</p>
            
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchLoginTab('login')">登录</button>
                <button class="login-tab" onclick="switchLoginTab('register')">创建角色</button>
            </div>

            <div id="loginForm">
                <input type="text" class="login-input" id="loginName" placeholder="道号">
                <input type="password" class="login-input" id="loginPassword" placeholder="密码">
                <button class="btn-login" onclick="handleLogin()">进入灵界</button>
            </div>

            <div id="registerForm" style="display: none;">
                <input type="text" class="login-input" id="regName" placeholder="道号 (2-8字)">
                <input type="password" class="login-input" id="regPassword" placeholder="密码 (至少6位)">
                <select class="login-input" id="regRoot">
                    <option value="金">金灵根 - 攻击加成10%</option>
                    <option value="木">木灵根 - 修炼加成15%</option>
                    <option value="水">水灵根 - 灵力加成20%</option>
                    <option value="火">火灵根 - 攻击加成15%</option>
                    <option value="土">土灵根 - 防御加成15%</option>
                </select>
                <button class="btn-login" onclick="handleRegister()">踏入仙途</button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div class="game-wrapper" id="gameWrapper">
        <header class="game-header">
            <div class="header-left">
                <button class="header-btn" onclick="togglePlayerPanel()">角色</button>
                <span class="header-logo">灵界</span>
                <span class="header-realm" id="headerRealm">锻体期一重</span>
                <span class="header-time" id="headerTime"></span>
            </div>
            <div class="header-right">
                <span id="headerPlayerName">--</span>
                <button class="header-btn" onclick="togglePanel('map')">地图</button>
                <button class="header-btn" onclick="togglePanel('dungeon')">秘境</button>
                <button class="header-btn" onclick="togglePanel('ranking')">排行</button>
                <button class="header-btn" onclick="togglePanel('chat')">聊天</button>
                <button class="header-btn" onclick="togglePanel('market')">坊市</button>
                <button class="header-btn" onclick="togglePanel('sect')">宗门</button>
                <button class="header-btn" onclick="togglePanel('crafting')">炼造</button>
                <button class="header-btn" onclick="togglePanel('inventory')">储物</button>
                <button class="header-btn" onclick="togglePanel('guide')">说明</button>
                <button class="header-btn btn-logout" onclick="handleLogout()">退出</button>
            </div>
        </header>

        <div class="game-body">
            <aside class="player-panel" id="playerPanel">
                <div class="panel-section">
                    <h3 class="panel-title">角色信息</h3>
                    <div class="stat-row"><span class="stat-label">道号</span><span class="stat-value" id="statName">--</span></div>
                    <div class="stat-row"><span class="stat-label">境界</span><span class="stat-value" id="statRealm">--</span></div>
                    <div class="stat-row"><span class="stat-label">灵根</span><span class="stat-value" id="statRoot">--</span></div>
                    <div class="stat-row"><span class="stat-label">修为</span><span class="stat-value" id="statCultivation">--</span></div>
                    <div class="progress-container">
                        <div class="progress-bar" id="cultivationProgress" style="width: 0%"></div>
                        <span class="progress-text" id="cultivationProgressText">0%</span>
                    </div>
                    <div id="breakthroughArea" style="margin-top: 8px;"></div>
                </div>

                <div class="panel-section">
                    <h3 class="panel-title">属性</h3>
                    <div class="stat-row"><span class="stat-label">生命</span><span class="stat-value hp" id="statHp">--</span></div>
                    <div class="stat-row"><span class="stat-label">灵力</span><span class="stat-value mp" id="statMp">--</span></div>
                    <div class="stat-row"><span class="stat-label">攻击</span><span class="stat-value atk" id="statAtk">--</span></div>
                    <div class="stat-row"><span class="stat-label">防御</span><span class="stat-value def" id="statDef">--</span></div>
                    <div class="stat-row"><span class="stat-label">神识</span><span class="stat-value spirit" id="statSpirit">--</span></div>
                </div>

                <div class="panel-section">
                    <h3 class="panel-title">资源</h3>
                    <div class="stat-row"><span class="stat-label">灵石</span><span class="stat-value" id="statGold">0</span></div>
                    <div class="stat-row"><span class="stat-label">位置</span><span class="stat-value" id="statArea">--</span></div>
                    <div class="stat-row"><span class="stat-label">击杀</span><span class="stat-value" id="statKills">0</span></div>

    <script>
        // ==================== 游戏数据 ====================
        const REALMS = [
            { name: '锻体期', stages: ['一重','二重','三重','四重','五重','六重','七重','八重','九重'], hpBase: 100, atkBase: 10, defBase: 5 },
            { name: '练气期', stages: ['一层','二层','三层','四层','五层','六层','七层','八层','九层'], hpBase: 250, atkBase: 25, defBase: 12 },
            { name: '筑基期', stages: ['前期','中期','后期','大圆满'], hpBase: 600, atkBase: 50, defBase: 25 },
            { name: '金丹期', stages: ['前期','中期','后期','大圆满'], hpBase: 1500, atkBase: 100, defBase: 50 },
            { name: '元婴期', stages: ['前期','中期','后期','大圆满'], hpBase: 4000, atkBase: 200, defBase: 100 },
            { name: '化神期', stages: ['前期','中期','后期','大圆满'], hpBase: 10000, atkBase: 400, defBase: 200 },
            { name: '炼虚期', stages: ['前期','中期','后期','大圆满'], hpBase: 25000, atkBase: 800, defBase: 400 },
            { name: '合道期', stages: ['前期','中期','后期','大圆满'], hpBase: 60000, atkBase: 1600, defBase: 800 },
            { name: '大乘期', stages: ['前期','中期','后期','大圆满'], hpBase: 150000, atkBase: 3200, defBase: 1600 },
            { name: '渡劫期', stages: ['一重','二重','三重','四重','五重','六重','七重','八重','九重'], hpBase: 400000, atkBase: 6400, defBase: 3200 },
            { name: '真仙', stages: ['初入'], hpBase: 1000000, atkBase: 12800, defBase: 6400 }
        ];

        const ROOT_BONUSES = {
            '金': { name: '金灵根', atk: 0.1, def: 0, hp: 0, mp: 0, cultivation: 0 },
            '木': { name: '木灵根', atk: 0, def: 0, hp: 0, mp: 0, cultivation: 0.15 },
            '水': { name: '水灵根', atk: 0, def: 0, hp: 0, mp: 0.2, cultivation: 0.1 },
            '火': { name: '火灵根', atk: 0.15, def: 0, hp: 0, mp: 0, cultivation: 0 },
            '土': { name: '土灵根', atk: 0, def: 0.15, hp: 0.1, mp: 0, cultivation: 0 }
        };

        const AREAS = {
            '青云郡': [
                { name: '灵溪村', level: 1, danger: '安全' },
                { name: '灵溪河畔', level: 1, danger: '低危' },
                { name: '翠竹小径', level: 2, danger: '低危' },
                { name: '落霞崖', level: 3, danger: '中危' },
                { name: '雾隐村', level: 4, danger: '中危' },
                { name: '青云城', level: 1, danger: '安全', hub: true }
            ],
            '沧海郡': [
                { name: '碧波渡', level: 5, danger: '中危' },
                { name: '青松林', level: 6, danger: '中危' },
                { name: '沧海城', level: 5, danger: '安全', hub: true }
            ],
            '北荒郡': [
                { name: '北荒前哨', level: 7, danger: '高危' },
                { name: '寒渊冰原', level: 8, danger: '高危' },
                { name: '龙骸荒漠', level: 9, danger: '高危' }
            ]
        };

        const MONSTERS = [
            { name: '荒野灵兔', hpMult: 0.8, atkMult: 0.8, defMult: 0.8 },
            { name: '铁甲野猪', hpMult: 1.3, atkMult: 0.9, defMult: 1.4 },
            { name: '青鳞蛇妖', hpMult: 1.0, atkMult: 1.2, defMult: 0.9 },
            { name: '烈焰狼王', hpMult: 1.2, atkMult: 1.4, defMult: 1.0 },
            { name: '寒冰巨猿', hpMult: 1.5, atkMult: 1.1, defMult: 1.5 },
            { name: '飞天蜈蚣', hpMult: 0.9, atkMult: 1.5, defMult: 0.8 }
        ];

        const ITEMS = {
            '灵草': { type: 'material', icon: '🌿', desc: '初级炼丹材料' },
            '灵矿石': { type: 'material', icon: '💎', desc: '初级锻造材料' },
            '低阶妖核': { type: 'material', icon: '🔮', desc: '妖兽精华' },
            '中阶妖核': { type: 'material', icon: '🔮', desc: '中级妖兽精华' },
            '高阶妖核': { type: 'material', icon: '🔮', desc: '高级妖兽精华' },
            '回气丹': { type: 'pill', icon: '💊', desc: '恢复100点灵力', effect: { mp: 100 } },
            '疗伤丹': { type: 'pill', icon: '💉', desc: '恢复200点生命', effect: { hp: 200 } },
            '聚灵丹': { type: 'pill', icon: '✨', desc: '增加1000修为', effect: { cultivation: 1000 } },
            '突破丹': { type: 'pill', icon: '🌟', desc: '突破成功率+20%', effect: { breakthrough: 0.2 } },
            '灵芝': { type: 'material', icon: '🍄', desc: '中级炼丹材料' },
            '精金矿': { type: 'material', icon: '⚙️', desc: '中级锻造材料' }
        };

        const DUNGEONS = [
            { name: '灵溪洞府', level: 1, stages: 3, rewards: ['灵草', '回气丹'], bossRewards: ['疗伤丹', '聚灵丹'] },
            { name: '青竹迷阵', level: 3, stages: 5, rewards: ['灵芝', '灵矿石'], bossRewards: ['突破丹', '中阶妖核'] },
            { name: '落霞秘境', level: 5, stages: 7, rewards: ['精金矿', '中阶妖核'], bossRewards: ['突破丹', '高阶妖核'] },
            { name: '碧波龙宫', level: 7, stages: 10, rewards: ['高阶妖核', '精金矿'], bossRewards: ['突破丹', '聚灵丹'] }
        ];

        const RECIPES = [
            { name: '回气丹', type: 'pill', materials: { '灵草': 2 }, result: { '回气丹': 1 } },
            { name: '疗伤丹', type: 'pill', materials: { '灵草': 3, '灵芝': 1 }, result: { '疗伤丹': 1 } },
            { name: '聚灵丹', type: 'pill', materials: { '灵芝': 2, '低阶妖核': 1 }, result: { '聚灵丹': 1 } },
            { name: '突破丹', type: 'pill', materials: { '灵芝': 3, '中阶妖核': 2 }, result: { '突破丹': 1 } }
        ];

        const SECT_BONUSES = {
            1: { name: '九霄宗', cultivation: 0.05, atk: 0, def: 0 },
            2: { name: '九霄宗', cultivation: 0.08, atk: 0.03, def: 0 },
            3: { name: '九霄宗', cultivation: 0.12, atk: 0.05, def: 0.03 },
            4: { name: '九霄宗', cultivation: 0.15, atk: 0.08, def: 0.05 },
            5: { name: '九霄宗', cultivation: 0.20, atk: 0.10, def: 0.08 }
        };

        // ==================== 游戏状态 ====================
        let gameState = null;
        let meditationInterval = null;
        let meditationStartTime = null;
        let onlinePlayers = [];
        let chatMessages = [];

        // 模拟在线玩家
        function generateOnlinePlayers() {
            const names = ['清风子', '明月道人', '云中鹤', '紫霞仙子', '剑痴', '药灵子', '龙傲天', '凤舞九天', '天机子', '玄机道人'];
            onlinePlayers = names.map((name, i) => ({
                name: name,
                realm: Math.floor(Math.random() * 5),
                stage: Math.floor(Math.random() * 9),
                power: Math.floor(Math.random() * 10000) + 1000
            }));
            
            // 添加自己
            if (gameState && gameState.player) {
                onlinePlayers.push({
                    name: gameState.player.name,
                    realm: gameState.player.realmIndex,
                    stage: gameState.player.stageIndex,
                    power: getPower(gameState.player)
                });
            }
        }

        // ==================== 工具函数 ====================
        function saveGame() {
            if (gameState) {
                localStorage.setItem('lingverse_save', JSON.stringify(gameState));
            }
        }

        function loadGame() {
            const saved = localStorage.getItem('lingverse_save');
            return saved ? JSON.parse(saved) : null;
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return Math.floor(num).toString();
        }

        function getTimestamp() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}]`;
        }

        function addLog(message, type = 'event') {
            const logContent = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="log-time">${getTimestamp()}</span>${message}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
            while (logContent.children.length > 150) logContent.removeChild(logContent.firstChild);
        }

        // ==================== 属性计算 ====================
        function getRealmIndex(p) { return p.realmIndex || 0; }
        function getStageIndex(p) { return p.stageIndex || 0; }

        function getRealmName(p) {
            const ri = getRealmIndex(p);
            const si = getStageIndex(p);
            if (ri >= REALMS.length) return '真仙';
            return `${REALMS[ri].name}${REALMS[ri].stages[Math.min(si, REALMS[ri].stages.length - 1)]}`;
        }

        function getCultivationRequired(p) {
            const ri = getRealmIndex(p);
            const si = getStageIndex(p);
            if (ri >= REALMS.length - 1) return Infinity;
            const baseExp = [100, 500, 2000, 8000, 30000, 100000, 400000, 1500000, 5000000, 20000000];
            const base = baseExp[Math.min(ri, baseExp.length - 1)];
            return Math.floor(base * (1 + si * 0.5));
        }

        function getMaxHp(p) {
            const realm = REALMS[Math.min(getRealmIndex(p), REALMS.length - 1)];
            const rootBonus = ROOT_BONUSES[p.root] || { hp: 0 };
            const sectBonus = p.sectLevel ? (SECT_BONUSES[p.sectLevel] || { cultivation: 0 }) : { cultivation: 0 };
            const base = realm.hpBase * (1 + getStageIndex(p) * 0.3);
            return Math.floor(base * (1 + rootBonus.hp) * (1 + (sectBonus.cultivation || 0) * 0.2));
        }

        function getMaxMp(p) {
            const base = 50 + getRealmIndex(p) * 50;
            const rootBonus = ROOT_BONUSES[p.root] || { mp: 0 };
            return Math.floor(base * (1 + getStageIndex(p) * 0.2) * (1 + rootBonus.mp));
        }

        function getAtk(p) {
            const realm = REALMS[Math.min(getRealmIndex(p), REALMS.length - 1)];
            const rootBonus = ROOT_BONUSES[p.root] || { atk: 0 };
            const sectBonus = p.sectLevel ? (SECT_BONUSES[p.sectLevel] || { atk: 0 }) : { atk: 0 };
            const base = realm.atkBase * (1 + getStageIndex(p) * 0.2);
            return Math.floor(base * (1 + rootBonus.atk + (sectBonus.atk || 0)));
        }

        function getDef(p) {
            const realm = REALMS[Math.min(getRealmIndex(p), REALMS.length - 1)];
            const rootBonus = ROOT_BONUSES[p.root] || { def: 0 };
            const sectBonus = p.sectLevel ? (SECT_BONUSES[p.sectLevel] || { def: 0 }) : { def: 0 };
            const base = realm.defBase * (1 + getStageIndex(p) * 0.2);
            return Math.floor(base * (1 + rootBonus.def + (sectBonus.def || 0)));
        }

        function getMaxSpirit(p) { return 10 + getRealmIndex(p) * 5; }
        function getPower(p) { return Math.floor(getAtk(p) * 2 + getDef(p) + getMaxHp(p) / 10); }
        function getCultivationRate(p) {
            const rootBonus = ROOT_BONUSES[p.root] || { cultivation: 0 };
            const sectBonus = p.sectLevel ? (SECT_BONUSES[p.sectLevel] || { cultivation: 0 }) : { cultivation: 0 };
            return (1 + getRealmIndex(p) * 0.5) * (1 + rootBonus.cultivation) * (1 + (sectBonus.cultivation || 0));
        }

        // ==================== UI更新 ====================
        function updateUI() {
            if (!gameState || !gameState.player) return;
            const p = gameState.player;

            document.getElementById('headerPlayerName').textContent = p.name;
            document.getElementById('headerRealm').textContent = getRealmName(p);
            document.getElementById('headerTime').textContent = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});

            document.getElementById('statName').textContent = p.name;
            document.getElementById('statRealm').textContent = getRealmName(p);
            document.getElementById('statRoot').textContent = ROOT_BONUSES[p.root]?.name || p.root;
            document.getElementById('statCultivation').textContent = `${formatNumber(p.cultivation)} / ${formatNumber(getCultivationRequired(p))}`;

            const progress = Math.min(100, (p.cultivation / getCultivationRequired(p)) * 100);
            document.getElementById('cultivationProgress').style.width = progress + '%';
            document.getElementById('cultivationProgressText').textContent = progress.toFixed(1) + '%';

            document.getElementById('statHp').textContent = `${Math.floor(p.hp)} / ${getMaxHp(p)}`;
            document.getElementById('statMp').textContent = `${Math.floor(p.mp)} / ${getMaxMp(p)}`;
            document.getElementById('statAtk').textContent = getAtk(p);
            document.getElementById('statDef').textContent = getDef(p);
            document.getElementById('statSpirit').textContent = `${Math.floor(p.spirit)} / ${getMaxSpirit(p)}`;
            document.getElementById('statGold').textContent = formatNumber(p.gold);
            document.getElementById('statArea').textContent = p.currentArea;
            document.getElementById('statKills').textContent = p.kills || 0;
            document.getElementById('statPower').textContent = formatNumber(getPower(p));

            // 突破按钮
            const btArea = document.getElementById('breakthroughArea');
            if (p.cultivation >= getCultivationRequired(p)) {
                btArea.innerHTML = `<button class="btn-action primary" style="width:100%;padding:6px;font-size:11px;" onclick="handleBreakthrough()">⚡ 尝试突破</button>`;
            } else {
                btArea.innerHTML = '';
            }

            generateOnlinePlayers();
        }

        // 更新时间
        setInterval(() => {
            if (gameState) {
                document.getElementById('headerTime').textContent = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
            }
        }, 1000);

        // ==================== 登录系统 ====================
        function switchLoginTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        }

        function handleLogin() {
            const name = document.getElementById('loginName').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!name || !password) { alert('请输入道号和密码'); return; }
            const saved = loadGame();
            if (saved && saved.player && saved.player.name === name) {
                gameState = saved;
                startGame();
            } else {
                alert('角色不存在，请先创建角色');
            }
        }

        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const password = document.getElementById('regPassword').value;
            const root = document.getElementById('regRoot').value;
            if (name.length < 2 || name.length > 8) { alert('道号需要2-8个字'); return; }
            if (password.length < 6) { alert('密码至少6位'); return; }

            gameState = {
                player: {
                    name, root, password,
                    realmIndex: 0, stageIndex: 0,
                    cultivation: 0,
                    hp: 100, mp: 50, spirit: 10,
                    gold: 100, kills: 0,
                    currentArea: '灵溪村',
                    inventory: [
                        { name: '灵草', count: 5 },
                        { name: '回气丹', count: 3 },
                        { name: '疗伤丹', count: 2 }
                    ],
                    sectLevel: 0,
                    sectContribution: 0,
                    completedDungeons: []
                },
                chatMessages: []
            };
            saveGame();
            startGame();
            addLog(`🎉 ${name}踏入仙途，开始了修仙之旅！`, 'level');
        }

        function handleLogout() {
            saveGame();
            gameState = null;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('gameWrapper').classList.remove('active');
        }

        function startGame() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('gameWrapper').classList.add('active');
            updateUI();
            generateOnlinePlayers();
        }

        // ==================== 游戏功能 ====================
        function handleMeditate() {
            if (gameState.player.hp <= 0) { addLog('❌ 你已重伤，无法修炼！', 'error'); return; }
            document.getElementById('actionBar').style.display = 'none';
            document.getElementById('meditationBar').classList.add('active');
            meditationStartTime = Date.now();
            meditationInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - meditationStartTime) / 1000);
                document.getElementById('meditationTime').textContent = elapsed + '秒';
                document.getElementById('meditationCultivation').textContent = formatNumber(Math.floor(elapsed * getCultivationRate(gameState.player)));
            }, 1000);
        }

        function handleStopMeditate() {
            if (!meditationInterval) return;
            clearInterval(meditationInterval);
            meditationInterval = null;

            const elapsed = (Date.now() - meditationStartTime) / 1000;
            const cultivation = Math.floor(elapsed * getCultivationRate(gameState.player));

            gameState.player.cultivation += cultivation;

            const hpRegen = Math.floor(getMaxHp(gameState.player) * elapsed / 480);
            const mpRegen = Math.floor(getMaxMp(gameState.player) * elapsed / 300);
            const spiritRegen = Math.floor(getMaxSpirit(gameState.player) * elapsed / 300);

            gameState.player.hp = Math.min(getMaxHp(gameState.player), gameState.player.hp + hpRegen);
            gameState.player.mp = Math.min(getMaxMp(gameState.player), gameState.player.mp + mpRegen);
            gameState.player.spirit = Math.min(getMaxSpirit(gameState.player), gameState.player.spirit + spiritRegen);

            addLog(`🧘 冥想${Math.floor(elapsed)}秒，获得 <span style="color:var(--text-purple)">${formatNumber(cultivation)}</span> 修为，恢复 ${hpRegen}血 ${mpRegen}灵 ${spiritRegen}识`, 'event');

            document.getElementById('actionBar').style.display = 'flex';
            document.getElementById('meditationBar').classList.remove('active');

            updateUI();
            saveGame();
        }

        function handleExplore() {
            if (gameState.player.spirit < 1) { addLog('❌ 神识不足，无法探索！', 'error'); return; }
            if (gameState.player.hp <= 0) { addLog('❌ 你已重伤，无法探索！', 'error'); return; }

            gameState.player.spirit -= 1;
            const roll = Math.random();

            if (roll < 0.35) {
                startCombat();
            } else if (roll < 0.55) {
                const materials = getRealmIndex(gameState.player) < 2 ? ['灵草', '灵矿石', '低阶妖核'] : ['灵芝', '精金矿', '中阶妖核'];
                const item = materials[Math.floor(Math.random() * materials.length)];
                const count = Math.floor(Math.random() * 3) + 1;
                addItem(item, count);
                addLog(`🌿 在${gameState.player.currentArea}发现 <span style="color:var(--text-green)">${item} x${count}</span>`, 'loot');
            } else if (roll < 0.75) {
                const cultivation = Math.floor(Math.random() * 100 + 50) * (getRealmIndex(gameState.player) + 1);
                gameState.player.cultivation += cultivation;
                addLog(`💫 悟道心得，获得 <span style="color:var(--text-purple)">${cultivation}</span> 修为`, 'event');
            } else if (roll < 0.9) {
                const gold = Math.floor(Math.random() * 50 + 20) * (getRealmIndex(gameState.player) + 1);
                gameState.player.gold += gold;
                addLog(`💰 发现灵石 <span style="color:var(--text-gold)">${gold}</span>`, 'loot');
            } else {
                // 稀有事件 - 丹药
                if (Math.random() < 0.3) {
                    const pills = ['聚灵丹', '突破丹'];
                    const pill = pills[Math.floor(Math.random() * pills.length)];
                    addItem(pill, 1);
                    addLog(`✨ 奇遇！发现 <span style="color:var(--text-cyan)">${pill} x1</span>`, 'loot');
                } else {
                    addLog(`🍃 平安无事，四处闲逛了一番...`, 'event');
                }
            }

            updateUI();
            saveGame();
        }

        function handleBreakthrough() {
            const p = gameState.player;
            const required = getCultivationRequired(p);
            if (p.cultivation < required) { addLog('❌ 修为不足！', 'error'); return; }

            let baseRate = [1.0, 0.9, 0.8, 0.7, 0.6, 0.5, 0.3, 0.2, 0.15, 0.1][Math.min(getRealmIndex(p), 9)];
            const stageCount = REALMS[getRealmIndex(p)].stages.length;
            baseRate -= (stageCount > 4 ? getStageIndex(p) * 0.05 : getStageIndex(p) * 0.08);
            baseRate = Math.max(0.1, baseRate);

            const overflow = (p.cultivation - required) / required;
            baseRate += overflow * 0.2;
            baseRate = Math.min(0.98, baseRate);

            const success = Math.random() < baseRate;

            if (success) {
                p.cultivation -= required;
                p.stageIndex++;
                if (p.stageIndex >= REALMS[getRealmIndex(p)].stages.length) {
                    p.realmIndex++;
                    p.stageIndex = 0;
                    if (p.realmIndex >= REALMS.length) {
                        p.realmIndex = REALMS.length - 1;
                        addLog(`🏆 ${p.name}已证得真仙，永生不灭！`, 'level');
                    }
                }
                p.hp = getMaxHp(p);
                p.mp = getMaxMp(p);
                p.spirit = getMaxSpirit(p);
                addLog(`⚡ 突破成功！${getRealmName(p)} (${(baseRate * 100).toFixed(0)}%成功率)`, 'level');
            } else {
                p.cultivation = Math.floor(p.cultivation * 0.8);
                addLog(`💔 突破失败，损失20%修为 (${(baseRate * 100).toFixed(0)}%成功率)`, 'error');
            }

            updateUI();
            saveGame();
        }

        // ==================== 战斗系统 ====================
        function startCombat() {
            const p = gameState.player;
            const realmIdx = Math.min(getRealmIndex(p), REALMS.length - 1);
            const stageIdx = getStageIndex(p);
            const realm = REALMS[realmIdx];
            const monster = MONSTERS[Math.floor(Math.random() * MONSTERS.length)];

            const monsterHp = Math.floor(realm.hpBase * monster.hpMult * (1 + stageIdx * 0.25) * 1.2);
            const monsterAtk = Math.floor(realm.atkBase * monster.atkMult * (1 + stageIdx * 0.2) * 1.1);
            const monsterDef = Math.floor(realm.defBase * monster.defMult * (1 + stageIdx * 0.2) * 1.1);

            gameState.currentCombat = {
                monster: {
                    name: monster.name,
                    realm: getRealmName({ realmIndex: realmIdx, stageIndex: stageIdx }),
                    hp: monsterHp, maxHp: monsterHp,
                    atk: monsterAtk, def: monsterDef
                }
            };

            document.getElementById('monsterName').textContent = monster.name;
            document.getElementById('monsterRealm').textContent = getRealmName({ realmIndex: realmIdx, stageIndex: stageIdx });
            document.getElementById('monsterHp').textContent = monsterHp;
            document.getElementById('monsterAtk').textContent = monsterAtk;
            document.getElementById('monsterDef').textContent = monsterDef;
            document.getElementById('combatLog').innerHTML = '';

            document.getElementById('encounterModal').classList.add('active');
        }

        function handleCombatChoice(choice) {
            if (choice === 'flee') {
                if (Math.random() < 0.6) {
                    addLog(`🏃 成功逃离战斗！`, 'event');
                } else {
                    addLog(`❌ 逃跑失败，被迫战斗！`, 'error');
                    doCombat();
                }
            } else {
                doCombat();
            }
            document.getElementById('encounterModal').classList.remove('active');
            updateUI();
            saveGame();
        }

        function doCombat() {
            const combat = gameState.currentCombat;
            const p = gameState.player;
            const m = combat.monster;
            let log = '';

            const playerDmg = Math.max(1, getAtk(p) - m.def + Math.floor(Math.random() * 15));
            m.hp -= playerDmg;
            log += `<div class="combat-entry damage">你攻击${m.name}，造成 ${playerDmg} 伤害</div>`;

            if (m.hp <= 0) {
                const goldReward = Math.floor(Math.random() * 80 + 30) * (getRealmIndex(p) + 1);
                const expReward = Math.floor(Math.random() * 150 + 80) * (getRealmIndex(p) + 1);
                p.gold += goldReward;
                p.cultivation += expReward;
                p.kills = (p.kills || 0) + 1;

                if (Math.random() < 0.4) {
                    const drops = getRealmIndex(p) < 2 ? ['低阶妖核', '灵草'] : ['中阶妖核', '灵芝'];
                    const drop = drops[Math.floor(Math.random() * drops.length)];
                    addItem(drop, 1);
                    addLog(`⚔️ 击败${m.name}！获得 <span style="color:var(--text-gold)">${goldReward}灵石</span>、<span style="color:var(--text-purple)">${expReward}修为</span>，掉落 <span style="color:var(--text-cyan)">${drop}</span>`, 'combat');
                } else {
                    addLog(`⚔️ 击败${m.name}！获得 <span style="color:var(--text-gold)">${goldReward}灵石</span>、<span style="color:var(--text-purple)">${expReward}修为</span>`, 'combat');
                }
                return;
            }

            const monsterDmg = Math.max(1, m.atk - getDef(p) + Math.floor(Math.random() * 10));
            p.hp -= monsterDmg;
            log += `<div class="combat-entry damage">${m.name}攻击你，造成 ${monsterDmg} 伤害</div>`;

            document.getElementById('combatLog').innerHTML = log;

            if (p.hp <= 0) {
                p.hp = 0;
                addLog(`💀 被${m.name}击败，重伤倒地...`, 'error');
            }
        }

        // ==================== 物品系统 ====================
        function addItem(name, count) {
            const inv = gameState.player.inventory;
            const existing = inv.find(i => i.name === name);
            if (existing) existing.count += count;
            else inv.push({ name, count });
        }

        function hasItem(name, count = 1) {
            const item = gameState.player.inventory.find(i => i.name === name);
            return item && item.count >= count;
        }

        function removeItem(name, count = 1) {
            const idx = gameState.player.inventory.findIndex(i => i.name === name);
            if (idx === -1) return false;
            gameState.player.inventory[idx].count -= count;
            if (gameState.player.inventory[idx].count <= 0) gameState.player.inventory.splice(idx, 1);
            return true;
        }

        function useItem(idx) {
            const item = gameState.player.inventory[idx];
            if (!item || item.count <= 0) return;

            const data = ITEMS[item.name];
            if (!data || data.type !== 'pill') { addLog('❌ 该物品无法使用', 'error'); return; }

            const effect = data.effect;
            if (effect.hp) {
                gameState.player.hp = Math.min(getMaxHp(gameState.player), gameState.player.hp + effect.hp);
                addLog(`💉 使用${item.name}，恢复 ${effect.hp} 生命`, 'event');
            }
            if (effect.mp) {
                gameState.player.mp = Math.min(getMaxMp(gameState.player), gameState.player.mp + effect.mp);
                addLog(`💊 使用${item.name}，恢复 ${effect.mp} 灵力`, 'event');
            }
            if (effect.cultivation) {
                gameState.player.cultivation += effect.cultivation;
                addLog(`✨ 使用${item.name}，获得 ${effect.cultivation} 修为`, 'event');
            }
            if (effect.breakthrough) {
                gameState.player.breakthroughBonus = (gameState.player.breakthroughBonus || 0) + effect.breakthrough;
                addLog(`🌟 使用${item.name}，突破率永久+${effect.breakthrough * 100}%`, 'event');
            }

            item.count--;
            if (item.count <= 0) gameState.player.inventory.splice(idx, 1);

            updateUI();
            saveGame();
            renderInventory();
        }

            Object.entries(recipe.materials).forEach(([m, c]) => removeItem(m, c));
            Object.entries(recipe.result).forEach(([m, c]) => addItem(m, c));

        function enterDungeon(idx) {
            const dungeon = DUNGEONS[idx];
            const p = gameState.player;
            
            // 简化Boss战
            const bossHp = REALMS[Math.min(dungeon.level, REALMS.length - 1)].hpBase * 2;
            const bossAtk = REALMS[Math.min(dungeon.level, REALMS.length - 1)].atkBase * 1.5;
            
            // 模拟战斗
            let playerHp = p.hp;
            let bossHpRemaining = bossHp;
            let rounds = 0;
            let log = '';
            
            while (playerHp > 0 && bossHpRemaining > 0 && rounds < 20) {
                rounds++;
                const playerDmg = Math.max(1, getAtk(p) - Math.floor(bossAtk * 0.3) + Math.floor(Math.random() * 20));
                bossHpRemaining -= playerDmg;
                log += `<div class="combat-entry damage">回合${rounds}: 你造成 ${playerDmg} 伤害，Boss剩余 ${Math.max(0, bossHpRemaining)} HP</div>`;
                
                if (bossHpRemaining <= 0) break;
                
                const bossDmg = Math.max(1, bossAtk - getDef(p) + Math.floor(Math.random() * 15));
                playerHp -= bossDmg;
                log += `<div class="combat-entry damage">Boss反击 ${bossDmg} 伤害，你剩余 ${Math.max(0, playerHp)} HP</div>`;
            }
            
            document.getElementById('dungeonTitle').textContent = `${dungeon.name} - Boss战`;
            
            if (bossHpRemaining <= 0) {
                // 胜利奖励
                const goldReward = dungeon.level * 100;
                const expReward = dungeon.level * 500;
                p.gold += goldReward;
                p.cultivation += expReward;
                p.sectContribution = (p.sectContribution || 0) + dungeon.level * 10;
                
                // 随机掉落
                const drop = dungeon.bossRewards[Math.floor(Math.random() * dungeon.bossRewards.length)];
                addItem(drop, 1);
                
                log += `<div class="combat-event info" style="color:var(--text-green);font-weight:600">🎉 挑战成功！获得 ${goldReward}灵石 ${expReward}修为 ${drop}x1 贡献+${dungeon.level * 10}</div>`;
            } else {
                log += `<div class="combat-event damage" style="color:var(--text-red);font-weight:600">💀 挑战失败...请提升实力后再试</div>`;
            }
            
            document.getElementById('dungeonContent').innerHTML = log;
            document.getElementById('dungeonModal').classList.add('active');
            
            updateUI();
            saveGame();
        }

        function closeDungeonModal() {
            document.getElementById('dungeonModal').classList.remove('active');
        }

        function travelTo(name) {
            gameState.player.currentArea = name;
            addLog(`🗺️ 前往 ${name}`, 'event');
            updateUI();
            saveGame();
            renderMap();
        }

        function closePanel() {
            document.getElementById('sidePanel').classList.remove('active');
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            const saved = loadGame();
            if (saved && saved.player) {
                gameState = saved;
                startGame();
            }
        });
    </script>
</body>
</html>
